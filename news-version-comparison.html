<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Compare English Versions A/B/C</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #66717f;
      --line: #dce2e8;
      --soft: #f3f6f8;
      --paper: #ffffff;
      --accent: #174f7a;
      --shadow: 0 7px 24px rgba(19, 38, 56, 0.09);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body {
      margin: 0;
      background: #eef2f5;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.68;
      -webkit-text-size-adjust: 100%;
    }
    button { font: inherit; touch-action: manipulation; }
    .shell {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
    }
    .sticky-panel {
      position: sticky;
      z-index: 20;
      top: 0;
      padding: max(10px, env(safe-area-inset-top)) 16px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
    }
    .progress {
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .article-tabs {
      display: flex;
      gap: 8px;
      margin: 0 -4px 10px;
      padding: 2px 4px 4px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }
    .article-tabs::-webkit-scrollbar { display: none; }
    .article-tab {
      flex: 0 0 46px;
      min-height: 40px;
      scroll-snap-align: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
    }
    .article-tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .version-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 4px;
      border-radius: 13px;
      background: var(--soft);
    }
    .version-tab {
      min-height: 46px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
    }
    .version-tab[aria-selected="true"] {
      background: var(--paper);
      color: var(--accent);
      box-shadow: 0 2px 9px rgba(23, 79, 122, 0.13);
    }
    .instruction {
      margin: 0;
      padding: 18px 20px 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }
    .article {
      padding: 18px 20px 24px;
    }
    .article h1 {
      margin: 0 0 24px;
      font-size: clamp(27px, 7vw, 38px);
      line-height: 1.18;
      letter-spacing: -0.025em;
    }
    .article-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: 520px;
      margin: 0 0 24px;
      border-radius: 14px;
      background: var(--soft);
      object-fit: cover;
    }
    .article-content h2 {
      margin: 30px 0 9px;
      font-size: 19px;
      line-height: 1.35;
    }
    .article-content p { margin: 0 0 19px; }
    .article-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px calc(24px + env(safe-area-inset-bottom));
    }
    .nav-button {
      min-height: 52px;
      border: 1px solid #bac5cf;
      border-radius: 12px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 750;
      cursor: pointer;
    }
    .nav-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .nav-button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }
    button:focus-visible {
      outline: 3px solid rgba(23, 79, 122, 0.24);
      outline-offset: 2px;
    }
    .noscript {
      margin: 24px;
      padding: 18px;
      border: 1px solid #e5b9b9;
      border-radius: 12px;
      background: #fff3f3;
    }
    @media (min-width: 761px) {
      body { padding: 24px 0; }
      .shell { border-radius: 20px; box-shadow: var(--shadow); overflow: clip; }
      .sticky-panel { border-radius: 20px 20px 0 0; }
      .article, .instruction { padding-left: 40px; padding-right: 40px; }
      .article-nav { padding-left: 36px; padding-right: 36px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="sticky-panel">
      <p class="progress" id="progressText">Article 01 of 10</p>
      <nav class="article-tabs" role="tablist" aria-label="Articles">
        <button class="article-tab" type="button" role="tab" data-article-id="01">01</button><button class="article-tab" type="button" role="tab" data-article-id="02">02</button><button class="article-tab" type="button" role="tab" data-article-id="03">03</button><button class="article-tab" type="button" role="tab" data-article-id="04">04</button><button class="article-tab" type="button" role="tab" data-article-id="05">05</button><button class="article-tab" type="button" role="tab" data-article-id="06">06</button><button class="article-tab" type="button" role="tab" data-article-id="07">07</button><button class="article-tab" type="button" role="tab" data-article-id="08">08</button><button class="article-tab" type="button" role="tab" data-article-id="09">09</button><button class="article-tab" type="button" role="tab" data-article-id="10">10</button>
      </nav>
      <nav class="version-tabs" role="tablist" aria-label="Versions">
        <button class="version-tab" type="button" role="tab" data-version="A">A</button>

        <button class="version-tab" type="button" role="tab" data-version="C">C</button>

    </header>

    <p class="instruction">Here are ten news stories, each presented in three writing versions: A, B, and C. Feel free to explore them all and, based on your overall experience, choose the version you think is best.</p>

      <h1 id="headline"></h1>
      <img class="article-image" id="articleImage" alt="" decoding="async">
      <div class="article-content" id="articleContent"></div>

    <nav class="article-nav" aria-label="Article navigation">
      <button class="nav-button" id="previousButton" type="button">Previous article</button>
      <button class="nav-button primary" id="nextButton" type="button">Next article</button>
    </nav>
  </main>

r to appear in person on Thursday, July 23, to explain how the unrecognised organisation operated and what security authorities did after questions arose over its status.\u003c/p\u003e\n\u003cp\u003eBoth inquiries centre on the same issue: how an organisation disowned by the Presidency and alleged to have no legal authority reportedly operated for about two years from the Federal Secretariat in Abuja while presenting itself as a government body.\u003c/p\u003e\n\u003ch2\u003eThe Foreign Ministry Rejected Three Approaches\u003c/h2\u003e\n\u003cp\u003eForeign Affairs Ministry Permanent Secretary Dunoma Ahmed told the House ad hoc committee on Tuesday that the ministry never recognised the PFIPC or established an official relationship with it.\u003c/p\u003e\n\u003cp\u003eAhmed said Adeniyi Adeyemi, who presented himself as director-general of both the PFIPC and the Presidential Economic Advisory Council, approached the ministry on June 26, 2025, August 5, 2025, and June 5, 2026. He sought support for a proposed World Investment Summit in Nigeria, but the ministry rejected all three requests after finding inconsistencies in the submitted documents and correspondence.\u003c/p\u003e\n\u003cp\u003eThe ministry wrote to the Office of the National Security Adviser on October 16, 2025, seeking clarification about Adeyemi and the PFIPC. According to Ahmed’s account, the security adviser’s office replied on November 26 that checks with the Office of the Secretary to the Government of the Federation and the Office of the Chief of Staff showed that neither Adeyemi nor the council was known to the federal government.\u003c/p\u003e\n\u003cp\u003eAhmed also said the ministry did not participate in any bilateral or multilateral engagement through the PFIPC, execute any memorandum, treaty or investment agreement through it, or facilitate foreign investors, international partners or delegations on its behalf. Nigerian diplomatic missions likewise had no dealings with the organisation through the ministry.\u003c/p\u003e\n\u003ch2\u003eInvestigators Examine Its Access to Government Offices\u003c/h2\u003e\n\u003cp\u003ePresident Bola Tinubu directed the ICPC to investigate after the Presidency publicly disowned the PFIPC. The agency said the inquiry would examine how the organisation gained access to federal offices, who was responsible for its operations and whether any public officials facilitated its activities.\u003c/p\u003e\n\u003cp\u003eThe ICPC said Gbajabiamila arrived at its Abuja headquarters on Monday afternoon, answered investigators’ questions and left after the interview. It said his appearance was voluntary and followed an invitation, not an arrest.\u003c/p\u003e\n\u003cp\u003eThe PFIPC was allegedly operated by Adeyemi, who is accused of presenting himself as its director-general. The investigation remains open, and authorities have not yet established how the organisation secured space at the Federal Secretariat or whether government officials assisted it.\u003c/p\u003e\n\u003ch2\u003eLawmakers Demand Answers From Security Officials\u003c/h2\u003e\n\u003cp\u003eHouse committee chairman Yusuf Gagdi said National Security Adviser Nuhu Ribadu must explain what his office did after determining in November 2025 that the PFIPC was not recognised by the federal government. Lawmakers also ordered Foreign Affairs Minister Bianca Odumegwu-Ojukwu to appear personally and provide further explanations after she was represented by the permanent secretary.\u003c/p\u003e\n\u003cp\u003eThe committee also plans to invite the Presidential Economic Advisory Council because letterhead used by Adeyemi reportedly identified him as director-general of both that body and the PFIPC.\u003c/p\u003e\n\u003cp\u003eWhat is confirmed is that the Foreign Affairs Ministry and the Presidency did not recognise the PFIPC, the ministry rejected its three approaches, and the ICPC and the House are conducting separate inquiries. Investigators still need to establish how it operated from federal premises, what authorities did after detecting the problem and whether anyone facilitated its activities.\u003c/p\u003e"},"B":{"headline":"Nigeria Widens PFIPC Probe as ICPC Questions Gbajabiamila","contentHtml":"\u003cp\u003eNigeria’s House of Representatives has widened its investigation into the purported Presidential Foreign Investment Promotion Council, or PFIPC, as federal agencies denied recognising or working with the body and an anti-corruption agency confirmed questioning presidential Chief of Staff Femi Gbajabiamila.\u003c/p\u003e\n\u003cp\u003eThe Independent Corrupt Practices and Other Related Offences Commission said Gbajabiamila appeared by invitation at its Abuja headquarters on Monday and gave a statement about the PFIPC’s operations. He left after answering investigators’ questions and was not arrested, the commission said.\u003c/p\u003e\n\u003cp\u003eThe ICPC said President Bola Tinubu had directed it to investigate the organisation, which allegedly operated under Adeniyi Adeyemi Matthew without presidential authorisation or legal recognition. The inquiry is examining how it obtained offices within the Federal Secretariat in Abuja and whether public officials helped its activities.\u003c/p\u003e\n\u003cp\u003eSeparately, the House ad hoc committee expressed frustration that several agency heads had not personally attended its hearings. It summoned Foreign Affairs Minister Bianca Odumegwu-Ojukwu and National Security Adviser Nuhu Ribadu to appear on Thursday, July 23.\u003c/p\u003e\n\u003cp\u003eCommittee Chairman Yusuf Gagdi said lawmakers wanted to know what security authorities did after government offices determined that the PFIPC was not a lawful federal institution. The panel also criticised the finance minister for sending a representative and warned that invited officials must appear personally.\u003c/p\u003e\n\u003cp\u003eForeign Affairs Permanent Secretary Dunoma Ahmed told lawmakers that the ministry never recognised the PFIPC or arranged investors, international partners or diplomatic engagements for it. He said Adeyemi sought ministry support for a proposed World Investment Summit in Nigeria on June 26, 2025, August 5, 2025, and June 5, 2026, but all three requests were rejected after inconsistencies were found in the submitted documents.\u003c/p\u003e\n\u003cp\u003eAhmed said the ministry asked the Office of the National Security Adviser on October 16, 2025, to clarify the status of Adeyemi and the PFIPC. The office replied on November 26 that checks with the Office of the Secretary to the Government of the Federation and the president’s chief of staff showed that neither Adeyemi nor the council was known to the federal government.\u003c/p\u003e\n\u003cp\u003eThe ministry also said no memorandum of understanding, treaty or investment agreement with a foreign government had been executed through the PFIPC, and Nigerian diplomatic missions had no dealings with it.\u003c/p\u003e\n\u003cp\u003eThe House committee is now seeking to establish how an unrecognised organisation gained access to government offices and presented itself as an official body. The ICPC said its investigation remains underway and further information will be released as appropriate.\u003c/p\u003e"},"C":{"headline":"House Widens PFIPC Probe After Foreign Affairs Disavows Council","contentHtml":"\u003cp\u003eNigeria’s House of Representatives has intensified its investigation into the purported Presidential Foreign Investment Promotion Council, summoning senior officials after the Foreign Affairs Ministry said the body and its alleged director-general had no federal recognition.\u003c/p\u003e\n\u003cp\u003eThe parliamentary inquiry is examining how the PFIPC allegedly operated from the Federal Secretariat in Abuja and presented itself as an official investment agency despite lacking presidential approval or legal standing.\u003c/p\u003e\n\u003cp\u003eCommittee Chairman Yusuf Gagdi summoned National Security Adviser Nuhu Ribadu and insisted that Foreign Affairs Minister Bianca Odumegwu-Ojukwu appear personally before the panel. The committee wants to know what action authorities took after questions about the council’s legitimacy were raised.\u003c/p\u003e\n\u003cp\u003eThe panel also criticised several heads of ministries, departments and agencies for failing to honour its invitations. It said officials must attend in person or face further legislative action.\u003c/p\u003e\n\u003ch2\u003eForeign Affairs rejected three approaches\u003c/h2\u003e\n\u003cp\u003eForeign Affairs Permanent Secretary Dunoma Ahmed told lawmakers that the ministry rejected three requests from Adeniyi Adeyemi, who presented himself as director-general of the PFIPC and the Presidential Economic Advisory Council.\u003c/p\u003e\n\u003cp\u003eThe requests, dated June 26, 2025, August 5, 2025 and June 5, 2026, sought ministry support for a proposed World Investment Summit in Nigeria. Ahmed said due diligence uncovered inconsistencies in the submitted documents, prompting the ministry to withhold its endorsement.\u003c/p\u003e\n\u003cp\u003eThe ministry subsequently asked the Office of the National Security Adviser to clarify Adeyemi’s status. According to Ahmed, the NSA replied on November 26, 2025, that checks with the offices of the Secretary to the Government of the Federation and the President’s chief of staff found that Adeyemi was unknown to the federal government.\u003c/p\u003e\n\u003cp\u003eAhmed said the ministry never recognised the PFIPC, participated in diplomatic engagements involving it or facilitated investors and foreign delegations on its behalf. He also said no treaty, memorandum of understanding or investment agreement was executed through the purported council.\u003c/p\u003e\n\u003cp\u003eLawmakers questioned why stronger action was not taken after the security checks. Gagdi said the NSA must explain how his office responded after determining that the organisation was not a lawful government institution.\u003c/p\u003e\n\u003ch2\u003eICPC questions presidential chief of staff\u003c/h2\u003e\n\u003cp\u003eThe legislative scrutiny is proceeding alongside an investigation by the Independent Corrupt Practices and Other Related Offences Commission. The ICPC confirmed that presidential Chief of Staff Femi Gbajabiamila appeared at its Abuja headquarters on Monday to make a statement about the council’s operations.\u003c/p\u003e\n\u003cp\u003eThe commission stressed that Gbajabiamila was invited and was not arrested. It said he answered investigators’ questions and left after the interview.\u003c/p\u003e\n\u003cp\u003ePresident Bola Tinubu directed the ICPC to investigate how the purported council allegedly operated for about two years from government offices, identify those responsible and determine whether any public officials facilitated its activities.\u003c/p\u003e\n\u003cp\u003eThe Presidency has disowned the PFIPC as a fraudulent entity without legal backing or presidential authorisation. Adeyemi has been identified in the investigation as the person who allegedly presented himself as its director-general.\u003c/p\u003e\n\u003cp\u003eThe ICPC said its investigation remains underway and further information will be released as it progresses. The House committee’s planned questioning of the foreign affairs minister and national security adviser is expected to focus on when officials became aware of the council and what they did after doubts about its legitimacy emerged.\u003c/p\u003e"}}},{"id":"02","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAFnAoADASIAAhEBAxEB/8QAHQAAAAcBAQEAAAAAAAAAAAAAAQIDBAUGBwAICf/EAFAQAAEDAwMCAwQGBwYFAgMGBwECAwQABREGEiExQQcTURQiYZEVMlJTcYEIIzNCVJKhNENiscHRFiREcvBj4SVVghc1RYOTorImJ8LS8eL/xAAbAQACAwEBAQAAAAAAAAAAAAAAA  on July 21, 2026. The blocks span onshore, shallow-water and deep-offshore areas in the Niger Delta, as well as frontier areas including the Benin, Anambra and Chad basins and the Benue Trough.\u003c/p\u003e\n\u003ch2\u003eMost Offered Blocks Attracted Bids\u003c/h2\u003e\n\u003cp\u003eThe commission initially offered 50 oil and gas blocks, of which 37 received bids and 13 attracted none. A total of 143 companies submitted 200 bids for the blocks that drew market interest, with 31 companies emerging from the competitive process.\u003c/p\u003e\n\u003cp\u003eThe 37 blocks that received bids were spread across all types of terrain, according to the commission. The original offer comprised 16 Niger Delta onshore blocks, 18 shallow-water blocks and one deep-offshore block, alongside three blocks in the Benin Basin and four each in the Anambra Basin, Chad Basin and Benue Trough.\u003c/p\u003e\n\u003cp\u003eThe regulator highlighted investor interest in frontier areas including the Benue Trough, Chad, Anambra and Benin basins, describing it as the first time those areas had attracted bidding on this scale. The statement did not specify how many bids each block received or identify where the 13 blocks without bids were located.\u003c/p\u003e\n\u003ch2\u003eSelection Does Not Complete the Awards\u003c/h2\u003e\n\u003cp\u003eAlthough the commission described the 31 companies as winners, they have not yet received final awards. The firms must first pay the appropriate signature bonuses, after which the awards require approval from the minister of petroleum resources under the Petroleum Industry Act 2021.\u003c/p\u003e\n\u003cp\u003eThe announcement therefore confirms the outcome of the competitive selection process, not the completion of licensing for all 37 blocks. Whether the selected companies meet the payment and approval requirements will determine if they ultimately secure the assets.\u003c/p\u003e\n\u003cp\u003eNUPRC Chief Executive Oritsemeyiwa Eyesan urged the selected companies to pay their signature bonuses without delay and begin developing the assets. She warned that companies failing to act could lose their blocks under the commission’s “drill or drop” provision, which prevents petroleum assets from being held indefinitely without development.\u003c/p\u003e\n\u003ch2\u003ePayments, Approvals and Development Come Next\u003c/h2\u003e\n\u003cp\u003eThe immediate next steps are the payment of signature bonuses and ministerial approval. Only after those conditions are met can the selected companies receive final awards and proceed with exploration and development.\u003c/p\u003e\n\u003cp\u003eThe results show that most of the offered blocks attracted market interest across both established producing regions and frontier basins. For the companies and the government, however, the practical outcome will depend on whether the provisional selections lead to completed awards, investment and activity on the ground.\u003c/p\u003e"},"B":{"headline":"Tinubu Approves Nigeria’s 2026 Oil and Gas Licensing Round","contentHtml":"\u003cp\u003eNigerian President Bola Tinubu has approved the start of a competitive 2026 oil and gas licensing round, as the government seeks new upstream investment and higher production amid fiscal pressure and questions over transparency in the petroleum market.\u003c/p\u003e\n\u003cp\u003eThe approval came a day before the Nigerian Upstream Petroleum Regulatory Commission announced that 31 companies had emerged as winners of 37 oil and gas blocks in the 2025 licensing round. The bidding exercise was held in Abuja on July 21, with 143 companies submitting 200 bids for 37 of the 50 blocks originally offered.\u003c/p\u003e\n\u003cp\u003eThe commission said the blocks receiving bids covered Niger Delta onshore, shallow-water and deep-offshore areas, as well as frontier regions including the Benin, Anambra and Chad basins and the Benue Trough. The remaining 13 blocks attracted no bids.\u003c/p\u003e\n\u003cp\u003eThe successful companies have not yet received final awards. They must pay the required signature bonuses and obtain approval from the minister of petroleum resources under the Petroleum Industry Act 2021, the regulator said. Commission chief executive Oritsemeyiwa Eyesan urged the companies to pay promptly and begin development, warning that they could lose the assets under a “drill or drop” provision.\u003c/p\u003e\n\u003cp\u003eThe 2026 round is expected to continue the competitive bidding approach by offering qualified investors additional exploration and development opportunities. The government says the exercise is intended to attract domestic and foreign capital, expand crude oil and natural gas production, and generate more public revenue. The supplied announcement did not specify the number of blocks, bidding timetable or qualification requirements.\u003c/p\u003e\n\u003cp\u003eThe investment drive comes as Nigeria’s petroleum finances face renewed scrutiny. Economist Dele Oye said an estimated 17.5 trillion naira liability owed by the federal government to the Nigerian National Petroleum Company Limited indicated that costs associated with the fuel subsidy announced as removed in 2023 may persist through energy-security expenses, under-recovery and other receivables.\u003c/p\u003e\n\u003cp\u003eOye argued that the arrangement reduced financial transparency and placed pressure on public finances. He also called for greater emphasis on domestic refining, reliable crude supplies for local refineries and a transparent fuel-pricing system. His comments represent an interpretation of the national oil company’s financial figures; the supplied material did not include a response from the government or NNPCL.\u003c/p\u003e\n\u003cp\u003eThe first test will be whether the 2025 winners promptly pay their bonuses and begin developing the awarded assets. Details of the 2026 block list, rules and timetable will then determine whether the government can convert investor interest into additional energy production and revenue.\u003c/p\u003e"},"C":{"headline":"Tinubu Approves Nigeria’s 2026 Oil and Gas Licensing Round","contentHtml":"\u003cp\u003ePresident Bola Tinubu has approved the start of Nigeria’s 2026 competitive oil and gas licensing round, extending the government’s effort to attract upstream investment after regulators selected provisional winners for 37 blocks in the previous exercise.\u003c/p\u003e\n\u003cp\u003eThe new round is intended to offer qualified investors opportunities to explore and develop petroleum assets under Nigeria’s existing regulatory framework. The government expects the process to support oil and gas production, draw domestic and foreign capital and strengthen long-term energy security.\u003c/p\u003e\n\u003cp\u003eDetails on the number and location of blocks to be offered, the bidding timetable and qualification requirements were not included in the announcement.\u003c/p\u003e\n\u003cp\u003eThe approval came as the Nigerian Upstream Petroleum Regulatory Commission concluded the bidding stage of its 2025 licensing round in Abuja on July 21. The regulator said 31 companies emerged as winners of 37 oil and gas blocks after 143 companies submitted 200 bids.\u003c/p\u003e\n\u003cp\u003eThirty-seven of the 50 blocks offered received bids, while 13 attracted none. The available assets covered onshore, shallow-water and deep-offshore areas, as well as frontier basins including the Benue Trough, Chad, Anambra and Benin basins.\u003c/p\u003e\n\u003ch2\u003eFinal awards depend on payments and ministerial approval\u003c/h2\u003e\n\u003cp\u003eThe successful bidders have not yet received final awards. The commission said companies must pay the required signature bonuses and obtain approval from the minister of petroleum resources in accordance with the Petroleum Industry Act of 2021.\u003c/p\u003e\n\u003cp\u003eNUPRC Chief Executive Oritsemeyiwa Eyesan urged the winners to make the payments promptly and begin developing the assets. She warned that companies could lose blocks if they fail to proceed under the commission’s “drill or drop” rule, which is intended to prevent license holders from leaving petroleum assets undeveloped.\u003c/p\u003e\n\u003cp\u003eThe regulator said the level of bidding interest in frontier basins was unprecedented for Nigeria. However, the 13 blocks that drew no offers also showed that investor demand was uneven across the assets presented.\u003c/p\u003e\n\u003cp\u003eThe 2026 round will test whether the government can sustain interest while converting competitive bids into exploration, production and public revenue. Its immediate milestones will be the publication of bidding terms and the completion of the outstanding payment and approval requirements for the 2025 winners.\u003c/p\u003e"}}},{"id":"03","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQIAdgB2AAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAFoAoADASIAAhEBAxEB/8QAHQAAAgIDAQEBAAAAAAAAAAAAAwQCBQABBgcICf/EAEQQAAEDAwIEBAQDBwIFAwQDAQEAAgMEESEFMQYSQVETImFxBzKBkRShsQgVI0LB0fBS4TNDYqLxFiSCNFNykiVEY7L/xAAcAQACAwEBAQEAAAAAAAAAAAACAwEEBQAGBwj/xAA1EQACAQQBAwIFAQcEAwEAAAAAAQIDESExBAUSQSJRBhMyYXHwFCOBkaGx0TNCwfEVUuEW/9oADAMBAAIRAxEAPwDzXost2WNW+i86j9UTQM2UXeyIQfRQdv1UsWgeFJuPZRJ9Vu49UGhyCtvdGZgIMe+yM3a65DAgyel1JqiDjBUgQSiFm91oi5upDa60fspGRBO2OEJ4sNkZ5HdCkXHMWlHdKTeybm7pWXqusUa6Ep/olXZTU/VKutc27pkTC5DyRN91GQWGykMb5UJNjhEVvAB/VCcEZ/VCcM+qlFSoDIRGC4UCpx2KZYpPYxCcgWT0GLJGHBT1OlzRocZljTHIVjTnOSq2mIVjTnPT7pdjWpjzLFbKjFsLKZyO11yLkWAm72CUl/NOSiwwEpIL4uFAUtC8gudlJrQBbKxzcqbR6LhDNW9FBw7bo/KSCQFFrC88rBzE9G5K4F6FHD0+qjbPqr/T+FuIdRFqLQtSmJH8tM+x+tlfUXwh+IVY4cnDdRE3e80jI/1KYqcpaRm8jqHEo/6lSK/LRxMY9EzD7L0/TfgJx1O2840ykPTxKnm//wCQVZs/Z84rEoZ+9NIDLfOXP+1uVH+z1X/tKP8A+j6ZF2dZHkzNkYDC9opP2etUsDPxLQNPZkDz+pCsKT9nmXxR+K4nYY+vhUpv+blP7LV9hi+L+jw3W/o/8HgMowkZxv0svZfjR8KoeDNGpdV0 tYElRBHMeqxYoewYnj3xt4Q/ijiGhj/6agDt0cvP4W2pWg72WLEUSfJy/Ejuado7LnqmVzLm5WLFyZEkgrZjLo0wObPGPouYqGnmWLFSrfWy/Q+hAHsAOTlbhPLL0tbPqsWKtJluJbU8gEfNa1uhVjC64bcHGyxYkSwPgxjmcfmOO4U7+YZBsLrFihMMutFksHNOR6qxfyOHRYsWrxvoRi8zFU//2Q==","versions":{"A":{"headline":"Atiku’s U.S. Lobbyists Send Tinubu Forfeiture Records to Trump Officials and Congress","contentHtml":"\u003ch2\u003eKey Points\u003c/h2\u003e\n\u003cp\u003eA Washington lobbying firm hired by Atiku Abubakar says it has begun distributing more than 60 pages of U.S. Department of Justice records concerning President Bola Tinubu’s 1993 civil forfeiture case to Trump administration officials, lawmakers and senior congressional staff. The firm says it wants U.S. policymakers to review the historical record. The case ended in a civil settlement involving the forfeiture of some funds, while a Nigerian court later found no evidence that Tinubu had been criminally convicted in the United States.\u003c/p\u003e\n\u003cp\u003eVon Batten-Montague-York, L.C. disclosed the effort in a post on X. Atiku, a former Nigerian vice president and the African Democratic Congress presidential candidate, retained the firm in March under a 12-month contract reportedly worth $1.2 million. Its work includes advocacy, diplomatic engagement and presenting Atiku’s positions on Nigeria-U.S. relations.\u003c/p\u003e\n\u003ch2\u003eThe Lobbying Effort Revives Attention on the Old Case\u003c/h2\u003e\n\u003cp\u003eThe firm said it began sending DOJ court filings, supporting affidavits, related federal court decisions and a case chronology after discussions with members of the Trump administration, Congress and senior congressional staff. It said some U.S. officials had previously been unaware of the historical case and that it wanted the records available for policymakers to review.\u003c/p\u003e\n\u003cp\u003eThe chronology revisits a DOJ investigation into an alleged heroin-trafficking network operating between Nigeria and the United States. According to the records, the U.S. government alleged that bank accounts in the United States associated with Tinubu held proceeds from narcotics trafficking or funds connected to money laundering, and it filed a civil forfeiture action in the U.S. District Court for the Northern District of Illinois.\u003c/p\u003e\n\u003cp\u003eThe government allegations also named Adegboyega Mueez Akande and Abiodun Agbele. The case was not resolved through a criminal trial. Instead, a civil settlement was reached in 1993 under which part of the disputed funds was forfeited to the U.S. government.\u003c/p\u003e\n\u003ch2\u003eCivil Forfeiture Did Not Establish a Criminal Conviction\u003c/h2\u003e\n\u003cp\u003eThat distinction became central to litigation over Nigeria’s 2023 presidential election. Atiku and Labour Party presidential candidate Peter Obi argued that the forfeiture proceedings affected Tinubu’s qualification to contest the election.\u003c/p\u003e\n\u003cp\u003eNigeria’s Presidential Election Petition Court rejected the argument. It ruled that the U.S. forfeiture proceedings were civil and that the petitioners had not established that Tinubu was convicted of a criminal offence in the United States or made false declarations to Nigeria’s Independent National Electoral Commission. The records now being circulated therefore concern a historical investigation and civil settlement, not a criminal conviction of Tinubu.\u003c/p\u003e\n\u003cp\u003eThe materials also address an ongoing Freedom of Information Act lawsuit filed in 2023 by journalist Aaron Greenspan, who sought additional records from several U.S. federal agencies concerning the historical investigation. The chronology says a U.S. court ruled in 2025 that some agencies could not use blanket refusals to confirm or deny whether records existed and ordered them to process portions of the request.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm said the documents are being provided to congressional committees for informational and oversight purposes. The effort has returned the old case to political discussion in Washington, but it does not change the established legal position: the 1993 proceeding ended in a civil settlement, and Nigeria’s election court found no resulting criminal conviction.\u003c/p\u003e"},"B":{"headline":"Atiku’s Lobbyist Sends Tinubu Forfeiture Records to US Officials","contentHtml":"\u003cp\u003eA Washington lobbying firm retained by former Nigerian Vice President Atiku Abubakar says it has begun providing more than 60 pages of U.S. Justice Department documents and court materials to Trump administration officials, members of Congress and senior congressional staff. The records concern historical allegations connected to a 1993 civil forfeiture case involving Nigerian President Bola Tinubu.\u003c/p\u003e\n\u003cp\u003eVon Batten-Montague-York was hired by Atiku, the African Democratic Congress presidential candidate, under a reported 12-month, $1.2 million contract signed in March. Its work includes diplomatic outreach, advocacy and presenting Atiku’s positions on Nigeria-U.S. relations.\u003c/p\u003e\n\u003cp\u003eIn a post on X, the firm said it began distributing Justice Department court filings, supporting affidavits and related federal court decisions after discussions with administration officials and congressional offices. It said some U.S. officials had not previously been aware of the case and that it wanted to ensure the records were available for review.\u003c/p\u003e\n\u003cp\u003eThe materials include a background chronology stating that the Justice Department investigated an alleged heroin-trafficking organization operating between Nigeria and the United States. The document says authorities alleged that proceeds generated between 1988 and 1991 were deposited into U.S. bank accounts associated with Tinubu. The allegations also named Adegboyega Mueez Akande and Abiodun Agbele.\u003c/p\u003e\n\u003cp\u003eThe U.S. government filed a civil forfeiture action in 1993 in the U.S. District Court for the Northern District of Illinois, alleging that the funds were narcotics proceeds or connected to money laundering. The matter ended in a settlement under which part of the money was forfeited to the U.S. government. The available materials do not show that Tinubu was criminally convicted in the United States over the case.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm is also highlighting a Freedom of Information Act lawsuit filed in 2023 by journalist Aaron Greenspan seeking investigative records from several federal agencies. According to the circulated chronology, a U.S. court ruled in 2025 that some agencies had to process portions of the request rather than issue blanket refusals to confirm or deny whether records existed. The firm said the materials were being supplied to congressional committees for informational and oversight purposes.\u003c/p\u003e\n\u003cp\u003eThe forfeiture case was previously raised in litigation challenging Nigeria’s 2023 presidential election result. Atiku and former Labour Party presidential candidate Peter Obi argued that the proceedings affected Tinubu’s eligibility to contest the election. Nigeria’s Presidential Election Petition Court rejected the argument, ruling that the U.S. proceedings were civil rather than criminal and that the petitioners had not proved Tinubu was convicted of a criminal offense or made false declarations to the Independent National Electoral Commission.\u003c/p\u003e\n\u003cp\u003eThe lobbying campaign returns the decades-old case to Washington’s policy discussion, but the documents being circulated concern historical allegations and civil proceedings, not a new criminal charge or conviction.\u003c/p\u003e"},"C":{"headline":"Atiku Lobbyist Sends Tinubu Forfeiture Records to US Officials","contentHtml":"\u003cp\u003eA Washington lobbying firm retained by Nigerian opposition leader Atiku Abubakar says it has begun distributing more than 60 pages of U.S. Justice Department records concerning President Bola Tinubu’s 1993 civil forfeiture case to Trump administration officials and members of Congress.\u003c/p\u003e\n\u003cp\u003eVon Batten-Montague-York, L.C. said it provided court filings, affidavits and related federal court decisions after discussions with administration officials, lawmakers and senior congressional staff. The firm said the materials were intended to make U.S. policymakers aware of the historical case and support congressional information and oversight efforts.\u003c/p\u003e\n\u003cp\u003eAbubakar, a former Nigerian vice president and presidential candidate of the African Democratic Congress, hired the firm in March under a 12-month contract reportedly valued at $1.2 million. Its work includes advocacy, diplomatic outreach and presenting his views on Nigeria-U.S. relations.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm said the documents concern Justice Department allegations connected to a heroin-trafficking investigation spanning the late 1980s and early 1990s. The records include a chronology of the forfeiture proceedings and later litigation seeking the release of federal records.\u003c/p\u003e\n\u003ch2\u003eThe records revive a contested political issue\u003c/h2\u003e\n\u003cp\u003eThe chronology says U.S. authorities investigated a suspected drug-trafficking organization operating between Nigeria and the United States and alleged that proceeds were deposited in American bank accounts associated with Tinubu. It identifies Tinubu, Adegboyega Mueez Akande and Abiodun Agbele among those named in the government’s allegations.\u003c/p\u003e\n\u003cp\u003eThe Justice Department filed a civil forfeiture action in 1993 in the U.S. District Court for the Northern District of Illinois. The matter ended in a negotiated settlement under which a portion of the funds was forfeited to the U.S. government. The supplied material contains no indication that Tinubu was criminally convicted in connection with the case.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm is also circulating information about a Freedom of Information Act lawsuit filed in 2023 by journalist Aaron Greenspan seeking additional federal records related to the investigation. According to the chronology, a federal court in Washington ruled in 2025 that some agencies could not issue blanket refusals to confirm or deny the existence of records and ordered them to process parts of the request. The litigation remains ongoing, the firm said.\u003c/p\u003e\n\u003cp\u003eThe forfeiture proceedings were previously raised by Abubakar and former Labour Party presidential candidate Peter Obi in challenges to Nigeria’s 2023 presidential election. Nigeria’s Presidential Election Petition Court rejected their argument, ruling that the U.S. proceedings were civil rather than criminal and that the petitioners had not established that Tinubu was convicted of a criminal offence or made false declarations to Nigeria’s electoral commission.\u003c/p\u003e\n\u003cp\u003eThe lobbying campaign places the decades-old case before U.S. officials as Abubakar expands his diplomatic advocacy in Washington. The materials did not include a response from Tinubu or his administration to the firm’s latest action.\u003c/p\u003e"}}},{"id":"04","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAGjAoADASIAAhEBAxEB/8QAHQAAAQUBAQEBAAAAAAAAAAAABQADBAYHAggBCf/EAEgQAAEDAwMCBAQDBgUCAwgBBQECAwQABREGEiExQQcTIlEUMmFxI4GRCBVCobHBJDNSYtEWcjRDkhclJlOCg+HwNUVjc5Oi/8QAGwEAAgMBAQEAAAAAAAAAAAAAAAMBAgQFBgf/xAAqEQACAwACAgICAQUBAAMAAAAAAQIDERIhBDEiQRNRBQYUMkJhIxZxsf/aAAwDAQACEQMRAD8AzHTg4T9qv9nHAqgabPy1oNoHpFavorparWPT+VH4I/pQG2dKPwqqAWh9BRSN84+1DIfQUUjfMKpIApH+UVNZGcVCj9BU1j+GoAmsD5anNdqgsfw1Oa7UASWfepTXaorXSpbVAD6a7SP61wmux/eoAcSK7Fciuk/3qrLHVKlSqAFSpUqAFSpUqAFSp uppt1Ss4zSpVJVkZwnPWmXCaVKgGNLpruaVKpIPhrk0qVBDOD1r6mlSqUQRXP8AMNfKVKrgLsa6j/5opUqANj8FVqbuUZSDtPndfyr0Pb3FnTUlJUcA8D25pUqqy8TJfEz/AMWyO20VU4oHtSpVSf8AkNXokPJTs6CgrqQXlZFKlVGWIrwGTxQqZw7xSpVQhEu2dU1aLf2+1KlWG32aIBRJOaR6UqVZTR9DrXA/KuJHy0qVNq9lJEJ35qjrpUq3xMzGXOhqC/8ANSpU1CZehjvT0f56VKmoQyex8w+9EY9KlVirCDfy0+mlSoKn/9k=","versions":{"A":{"headline":"Troops Rescue at Least 30 Kidnap Victims Across Northwest Nigeria","contentHtml":"\u003cp\u003eKey Points\u003cbr\u003eTroops from Nigeria’s Joint Task Force North West, operating under Operation FANSAN YAMMA, said they rescued or recovered at least 30 kidnap victims and prevented another abduction during operations in Sokoto, Zamfara, Katsina and Kebbi states from July 19 to 21. They also recovered 12 motorcycles, including 10 allegedly destined for terrorist groups, and detained four suspects for investigation. Some armed men escaped into surrounding areas, and pursuit and clearance operations are continuing.\u003c/p\u003e\n\u003cp\u003eThe operations were conducted by the Joint Task Force North West in response to residents’ reports, distress information and intelligence about armed groups’ movements, according to the military. Those recovered were handed to their families, community leaders or the relevant authorities.\u003c/p\u003e\n\u003ch2\u003eSwift Operations Free 27 People in Sokoto\u003c/h2\u003e\n\u003cp\u003eOn July 20, troops from forward operating bases in Shagari and Sifawa moved to the Wanke and Kaura communities in Sokoto State’s Shagari Local Government Area after reports of terrorist activity. The military said troops confronted the armed men at Kaura, forcing them to withdraw, and rescued six kidnap victims while recovering livestock and two motorcycles.\u003c/p\u003e\n\u003cp\u003eLater that day, troops stationed at Gandi and members of the Sokoto State Community Guard Corps found 10 kidnap victims at the Badanma community. The group, which included men, women and children, had escaped their captors and was found wandering in the bush. They were handed to community leaders and reunited with their families.\u003c/p\u003e\n\u003cp\u003eOn July 21, troops rescued another 11 people along the Gummi-Sokoto road. The military said armed men had blocked the highway to abduct travelers but fled after troops engaged and pursued them, leaving behind the victims and a motorcycle. The three operations brought the total rescued in Sokoto to 27.\u003c/p\u003e\n\u003ch2\u003eOperations in Other States Prevent Abductions and Disrupt Supplies\u003c/h2\u003e\n\u003cp\u003eTroops also responded on July 20 to Shiyan Abiyola in Zamfara State’s Kaura Namoda Local Government Area, where residents reported that armed men were attempting to abduct civilians. The military said the intervention forced the attackers to flee and enabled several residents to be rescued, after which troops secured the area against further attacks. It did not provide a precise number of people involved.\u003c/p\u003e\n\u003cp\u003eA day earlier, troops in Katsina State’s Faskari Local Government Area found three victims who had escaped their captors. According to the military, the three were abducted on July 14 while working on farms in Zamfara State’s Tsafe Local Government Area and escaped during heavy rain. They were transferred to the relevant authorities for reunification with their families.\u003c/p\u003e\n\u003cp\u003eAlso on July 19, troops in Kebbi State intercepted a vehicle carrying 10 motorcycles. The military alleged that the motorcycles were intended for terrorist groups and arrested four suspects believed to be awaiting the delivery. The suspects and motorcycles remain in custody for further investigation; the allegation has not been presented in the material as a court finding or completed investigative conclusion.\u003c/p\u003e\n\u003cp\u003eThe military said operations are continuing against the fleeing armed men and their hideouts and urged residents to report suspicious activity. What is confirmed is that at least 30 former captives were rescued or recovered across the operations, while several other residents were saved from an attempted abduction. The precise number involved in the Shiyan Abiyola intervention and the final findings concerning the motorcycles intercepted in Kebbi have not been disclosed.\u003c/p\u003e"},"B":{"headline":"Nigeria Reports Kidnap Rescues, Mass Arrests in Nationwide Security Operations","contentHtml":"\u003cp\u003eNigerian police and military authorities reported a series of anti-crime operations on Wednesday, including the rescue of kidnap victims in the North-West, raids on suspected criminal hideouts in Lagos and action against insurgent extortion and logistics in Yobe State.\u003c/p\u003e\n\u003cp\u003eThe operations were conducted between July 19 and 21. Separately, Inspector General of Police Olatunji Disu presented broader figures showing that police operations nationwide had arrested 1,198 suspects and rescued 166 kidnap victims since June 9.\u003c/p\u003e\n\u003ch2\u003eNorth-West rescues\u003c/h2\u003e\n\u003cp\u003eThe Operation FANSAN YAMMA theatre command said troops of the Joint Task Force North-West rescued 27 kidnap victims and disrupted further abduction attempts in Sokoto and Zamfara states on July 20 and 21.\u003c/p\u003e\n\u003cp\u003eMilitary spokesman Lieutenant Colonel Aliyu Danja said troops engaged armed men at Kaura community in Sokoto’s Shagari Local Government Area, forcing them to flee and freeing six captives. Livestock and two motorcycles were also recovered.\u003c/p\u003e\n\u003cp\u003eNear Gandi in Sokoto, soldiers working with the Sokoto State Community Guard Corps found another 10 victims who had escaped their abductors and were wandering in the bush. The group included men, women and children. Eleven more victims were freed along the Gummi-Sokoto road after troops pursued gunmen who had attempted to stop vehicles and abduct travelers, the military said.\u003c/p\u003e\n\u003cp\u003eTroops also responded to a distress call at Shiyan Abiyola in Zamfara’s Kaura Namoda Local Government Area on July 20, disrupting an attempted abduction and rescuing residents. A day earlier, soldiers in Faskari, Katsina State, found three kidnap victims who had escaped during heavy rain.\u003c/p\u003e\n\u003cp\u003eAlso on July 19, troops in Kebbi State intercepted a vehicle carrying 10 motorcycles suspected of being destined for terrorist groups. Four people allegedly awaiting the delivery were detained for further investigation.\u003c/p\u003e\n\u003ch2\u003eLagos raids and national figures\u003c/h2\u003e\n\u003cp\u003eThe Lagos State Police Command said coordinated early-morning raids at Boolar, Super Ile-Epo and other identified crime spots on July 19 resulted in the arrest of 147 suspects.\u003c/p\u003e\n\u003cp\u003ePolice reported recovering 250 expended cartridges, 22 machetes, five battle axes, two knives and substances suspected to be cannabis, among other items. The command said raids under Operation Ko S’AYE III would continue against suspected criminal hideouts.\u003c/p\u003e\n\u003cp\u003eAt a conference of senior officers in Abuja, Disu said the 1,198 arrests recorded nationwide since June 9 included suspects held for murder, armed robbery, kidnapping, cult-related activity and unlawful possession of firearms.\u003c/p\u003e\n\u003cp\u003eHe said police had also recovered 166 assorted firearms, 1,475 rounds of ammunition and 47 stolen vehicles while rescuing 166 abducted people. Disu instructed police commanders to adapt deployments to threats in their jurisdictions and warned that recent successes should not lead to operational complacency.\u003c/p\u003e\n\u003ch2\u003eYobe extortion operation\u003c/h2\u003e\n\u003cp\u003eIn the North-East, the military said Operation Hadin Kai troops stopped suspected Boko Haram and Islamic State West Africa Province members from collecting illegal levies from communities around Bukarti village on July 19.\u003c/p\u003e\n\u003cp\u003eCaptain Mohammed Goni, the operation’s acting media information officer, said troops intercepted two Volkswagen Golf vehicles and motorcycles along the Paya-Kafiya axis of Yobe State and exchanged fire with the armed group. One vehicle was immobilized and its driver was killed, while the other fighters abandoned their vehicle and fled into the bush.\u003c/p\u003e\n\u003cp\u003eA follow-up search the next day recovered the abandoned car, 25 rounds of belted PKT ammunition, a loaded AK-47 magazine, 15 empty ammunition cases, medicines and mechanical tools. The military said the items appeared to have supported the group’s logistics.\u003c/p\u003e\n\u003cp\u003ePolice and military authorities said efforts were continuing to pursue fleeing suspects, investigate detainees and disrupt kidnapping, extortion and supply networks used by armed groups.\u003c/p\u003e"},"C":{"headline":"Troops Rescue 27 Kidnap Victims in North-West Nigeria Operations","contentHtml":"\u003cp\u003eNigerian troops rescued 27 kidnap victims during operations on July 20 and 21, disrupting abduction attempts and pursuing suspected attackers in the country’s North-West, the regional military command said.\u003c/p\u003e\n\u003cp\u003eThe Joint Task Force North-West, operating under Operation Fansan Yamma, said soldiers acted on intelligence about armed groups in communities and along roads in Sokoto and Zamfara states.\u003c/p\u003e\n\u003cp\u003eTroops from forward operating bases in Shagari and Sifawa confronted suspected terrorists near Kaura community in Sokoto State on July 20, forcing them to flee and leave six captives behind, according to a statement by military spokesperson Lieutenant Colonel Aliyu Danja. The soldiers also recovered livestock and two motorcycles. The rescued people were later reunited with their families.\u003c/p\u003e\n\u003cp\u003eIn a separate operation that day, troops stationed at Gandi worked with the Sokoto State Community Guard Corps to recover 10 captives near Badanma community. The group, which included men, women and children, had escaped their abductors and was found in the bush before being handed to community leaders.\u003c/p\u003e\n\u003cp\u003eEleven more victims were rescued on July 21 after gunmen blocked the Gummi-Sokoto road and attempted to abduct travellers, the command said. Soldiers engaged and pursued the attackers, who abandoned the captives and a motorcycle as they fled.\u003c/p\u003e\n\u003ch2\u003eMilitary operations target abduction networks\u003c/h2\u003e\n\u003cp\u003eThe rescues followed other reported military actions against kidnapping and terrorist supply networks in the region. On July 20, troops responding to an attempted abduction at Shiyan Abiyola in Zamfara State forced the attackers to retreat, allowing residents to escape, according to a separate Operation Fansan Yamma account.\u003c/p\u003e\n\u003cp\u003eA day earlier, soldiers on patrol in Katsina State found three kidnapping victims who had escaped during heavy rain. The victims had reportedly been seized on July 14 while working on farms in Zamfara State and were transferred to the relevant authorities for reunification with their families.\u003c/p\u003e\n\u003cp\u003eTroops also intercepted a vehicle in Kebbi State carrying 10 motorcycles suspected of being intended for terrorist groups. Four people believed to have been waiting to receive the motorcycles were arrested, while the suspects and vehicles were retained for investigation, the military said.\u003c/p\u003e\n\u003cp\u003eThe Theatre Command said pursuit operations were continuing against suspects who escaped during the latest rescues, while troops were working to locate hideouts and restrict the movement and supply networks of armed groups.\u003c/p\u003e\n\u003cp\u003eThe command credited information from residents with helping security forces respond to the incidents and urged communities to continue reporting suspicious activity. Kidnapping remains a persistent threat across parts of northwestern Nigeria, where armed groups attack villages, farms and highways and hold civilians for ransom.\u003c/p\u003e"}}},{"id":"05","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCAETAdoDASIAAhEBAxEB/8QAHQAAAAcBAQEAAAAAAAAAAAAAAAECAwQFBwYICf/EAFUQAAIBAwIDBQQDCgcOBAcBAAECAwAEEQUSBiExBxMiQVEUMmFxCIGRFSMzQlKSobHB0RY2U1RysuEXNDdDRFVic3R1g5Pw8SQlgqIYJjVFRlZjwv/EABsBAAIDAQEBAAAAAAAAAAAAAAIDAQQFBgcA/8QAOBEAAQQBAwIFAQcCBQUBAAAAAQACAxEEBRIhMUEGEyIyUXEUFTNhgZGhI0IWJFLB4UOSsdHw8f/aAAwDAQACEQMRAD8A5WG1SK6WRLnvZZGALnotSJIW2krKqqGw5PLxedJBguLvFxL7KnkyL+ukyvaxo0sqbgZSc5/CD9le+gWvEzud1KTPeR6eTNLzdR72cZqhu9V1u/z7NCkMR93LE5q8u9Nl1qWRoI8LGNxXrtFPQaFcWyhQGPxJzTo5YGdeqZHkQRD1Vu/NR9AnvWiEF7tY45kcs1ODOZGjO5lT3Aq5wfWpul6ZILpGdc48qhu8cWrTKe9SMN1j6rVZ0wc80qb5mzPLglQxI8SyR3Qd9+8+DHdj40HizMyOzSejKM5pNrbtI5SF0RcZkDHGVpduXmlkea+SJFzlWUksPLFQXOHdRY7JqVBE6ON2FbJyK6+CK1u4Y5YmypUCuVZ1dGVk88daTZ3N3YnMDkrn3fKlyxF43D3KtkReaygacr650ucSkpIMH4U3NEtnC7vJuyMYxioB128H+IQ/M1FuLi4vJC8znn0UHwj6qW2GU+5JbjyD8QpSHfnJAcdcml4ptYyOhDfKnMVdTCj2MejBfnQXvG5A5oUakg5FCVCPay43UKBYt1oxUICioUKFfKEujFFijA518UJRijoDpR+VQUJKKhSqFA5fIZxShRCrHh/SbvWNRjs7OPe7ED5VXyJmQRmR/QJ2PjvnkEbOpR6FpF5q9yYbKPew61UzXEcOrXGnSZS4gYo6ty516p4J4YtOG9IRSiSXWAZHI6msK+krwleR3v8ADTR7YCRPDewoPwi+vxrjG+Kt2VsI9C76Xwi1mBe63rjjQqHpF7HfWUc6Hkyg1OK4Ga7WKQPbYXn0sZidtd1SaFChTrS7QoUMUMVK+tJoHpQoHpRKUmhigaLFfUiSKI0vFDFfIrTRoU4RTZFECiBSaFDFCiRApNA0KFEFKQ3U021PmmzUg0jBTZpFOGkHpTAbTAUmiPSjPWhRUjBSB1JIbHmQMiiYLuwRnFODzoRGLfiY4Q9TQk0jBpR9qliwDsT7hXpSZi0m0OcKep9KXcCCInumLJ556mmjIr8gMjzHnRsNi04c8ontIrdkEd4su/rhR4af9hj/AJw35oqNIoBG0Yp//wARU075Rl7vlS1WNsCXv9h6iI4zRmWxjuhOlok9iigLDOcMfjSYHnkeZ+/jREUFlY43fKjSW1EzMJWlKDMTIMeL4gjOKz3e6uUu9qk6TrBsNSbUFtozDKpSSIDkoPpWhWt7omr2SzRTxFT1G7JFZ1JJ32JLkxqAgXcnMYHwqC1hHKolV2RW6FDjdVSbFbM7cCWlU8nEiygLO0juu513iLR9 /cz6Kqkd5JvGxb50LWKN7twyA+A9aFCib0C+CsYIYhwzHMI17w5y2OdQ4lXHShQoo+h+qFvU/VRX5nnVtAidxH4E90fij0oUKsTK2zqV/9k=","versions":{"A":{"headline":"Nigeria Warns 17 States of Seven-Day Flood Risk, With Bauchi Most Exposed","contentHtml":"\u003ch2\u003eKey Points\u003c/h2\u003e\n\u003cp\u003eThe Nigeria Hydrological Services Agency has issued a seven-day advisory warning of medium flood risk in 17 states from July 21 to July 27. Elevated water levels at monitoring stations could cause localised flooding near major river channels and floodplains. Bauchi has the highest exposure, with 1,841 communities and numerous schools, health facilities and markets in vulnerable areas. Authorities and residents have been urged to evacuate high-risk locations, pre-position relief supplies and follow daily updates.\u003c/p\u003e\n\u003cp\u003eUmar Mohammed, director-general of the Nigeria Hydrological Services Agency (NIHSA), said in the National Flood Advisory issued on July 21 that 16 gauging stations nationwide were recording elevated water levels, with several stations exceeding watch or warning thresholds.\u003c/p\u003e\n\u003ch2\u003eRising Rivers Put 17 States at Risk\u003c/h2\u003e\n\u003cp\u003eThe advisory covers Adamawa, Bauchi, Benue, Borno, Edo, Gombe, Imo, Jigawa, Kaduna, Kano, Kebbi, Nasarawa, Niger, Plateau, Taraba, Yobe and Zamfara states.\u003c/p\u003e\n\u003cp\u003eNIHSA said thresholds had been exceeded at Saminara on the Karam River, the Waya Dam Site on the Waya River and Amber on the Amber River. The higher levels increase the likelihood of localised flooding in communities near major channels and floodplains, although the advisory does not mean every listed state or community will be flooded.\u003c/p\u003e\n\u003cp\u003eBauchi has the greatest exposure, with 1,841 communities, 145 schools, 101 health facilities and eight markets in vulnerable areas. NIHSA also identified 148 communities at risk in Edo, 415 in Imo, 168 in Kaduna, 205 in Plateau and five in Benue. Vulnerable areas in Edo also include 131 schools, 123 health facilities, four markets, seven religious centres and seven hectares of farmland.\u003c/p\u003e\n\u003ch2\u003eAuthorities Are Urged to Act Immediately\u003c/h2\u003e\n\u003cp\u003eNIHSA urged the National Emergency Management Agency, state emergency management agencies, local governments and community leaders to activate response plans and move residents, livestock and valuables from floodplains to safer locations.\u003c/p\u003e\n\u003cp\u003eThe agency also called on emergency services to pre-position food, medical supplies, clean water and water-treatment materials near areas that may be affected. It recommended using community volunteers and local communication channels to distribute warnings quickly.\u003c/p\u003e\n\u003cp\u003eResidents were cautioned against walking, driving or riding through flooded roads, bridges and fast-flowing waterways. Local authorities were also advised to clear blocked drains, culverts and waterways to improve water flow and reduce local flood risk.\u003c/p\u003e\n\u003cp\u003eThe advisory remains in effect through July 27. NIHSA advised the public and emergency agencies to monitor its daily flood bulletins because observed river levels and specific risk areas may change during the warning period.\u003c/p\u003e"},"B":{"headline":"Nigeria Issues Seven-Day Flood Alert for 17 States","contentHtml":"\u003cp\u003eThe Nigeria Hydrological Services Agency has issued a seven-day flood advisory, warning that 17 states face a medium flood risk from July 21 through July 27. Monitoring data showed that several rivers had exceeded warning thresholds, raising the prospect of localised flooding along major channels and floodplains.\u003c/p\u003e\n\u003cp\u003eThe affected states are Adamawa, Bauchi, Benue, Borno, Edo, Gombe, Imo, Jigawa, Kaduna, Kano, Kebbi, Nasarawa, Niger, Plateau, Taraba, Yobe and Zamfara.\u003c/p\u003e\n\u003cp\u003eUmar Mohammed, the agency’s director-general, said elevated water levels had been recorded at 16 gauging stations nationwide. Stations at Saminara on the Karam River, the Waya Dam site on the Waya River and Amber on the Amber River had crossed watch or warning thresholds.\u003c/p\u003e\n\u003cp\u003eBauchi has the greatest identified exposure, with 1,841 communities, 145 schools, 101 health facilities and eight markets in vulnerable areas. In Edo, the locations at risk include 148 communities, 131 schools, 123 health facilities, four markets, seven religious centres and seven hectares of farmland.\u003c/p\u003e\n\u003cp\u003eThe agency also identified 415 communities at risk in Imo, 205 in Plateau, 168 in Kaduna and five in Benue. Its advisory indicated that communities, public facilities and farmland in other affected states could also be exposed if flooding develops.\u003c/p\u003e\n\u003cp\u003eThe agency urged the National Emergency Management Agency, state emergency agencies, local governments and community leaders to activate response plans immediately. It recommended moving residents, livestock and valuables away from floodplains and pre-positioning food, medical supplies, clean water and water-treatment materials in safe locations.\u003c/p\u003e\n\u003cp\u003eMohammed called for warnings to be distributed through community volunteers and local communication channels. Residents were advised not to walk, drive or ride through flooded roads, bridges or fast-moving water, while authorities were asked to clear blocked drains, culverts and waterways.\u003c/p\u003e\n\u003cp\u003eThe alert follows a series of recent flood warnings. The hydrological agency previously identified 14 states at medium risk of localised flooding from July 14 to July 20, while the Federal Ministry of Environment had also warned of possible flooding across 26 states and the Federal Capital Territory.\u003c/p\u003e\n\u003cp\u003eResidents and emergency agencies have been advised to follow the hydrological service’s daily bulletins through July 27. With water levels elevated at multiple monitoring stations, early evacuation and the placement of relief supplies will be central to limiting risks to lives and property.\u003c/p\u003e"},"C":{"headline":"Nigeria Warns 17 States of Flood Risk as River Levels Rise","contentHtml":"\u003cp\u003eNigeria’s hydrological agency has warned that 17 states face a medium risk of flooding through July 27 after river levels exceeded alert thresholds at monitoring stations across the country.\u003c/p\u003e\n\u003cp\u003eThe Nigeria Hydrological Services Agency said localised flooding could occur along major river channels and floodplains, placing communities, schools, health facilities, markets and farmland at risk. Its seven-day National Flood Advisory covers the period from July 21 to July 27.\u003c/p\u003e\n\u003cp\u003eThe states under alert are Adamawa, Bauchi, Benue, Borno, Edo, Gombe, Imo, Jigawa, Kaduna, Kano, Kebbi, Nasarawa, Niger, Plateau, Taraba, Yobe and Zamfara.\u003c/p\u003e\n\u003cp\u003eNIHSA Director-General Umar Mohammed said 16 gauging stations were recording elevated water levels. Stations at Saminara on the Karam River, the Waya Dam site on the Waya River and Amber on the Amber River had crossed watch and warning thresholds, he said.\u003c/p\u003e\n\u003ch2\u003eBauchi faces the greatest identified exposure\u003c/h2\u003e\n\u003cp\u003eBauchi has the largest number of communities classified as vulnerable, with 1,841 communities, 145 schools, 101 health facilities and eight markets in areas that could be affected, according to the advisory.\u003c/p\u003e\n\u003cp\u003eThe agency also identified hundreds of vulnerable communities in several other states, including Imo, Plateau, Kaduna and Edo. The warning points to the possibility of local flooding rather than predicting that every listed location will be inundated.\u003c/p\u003e\n\u003cp\u003eNIHSA urged state and local authorities, emergency agencies and community leaders to begin protective measures immediately. Its recommendations include moving residents, livestock and valuables away from floodplains, preparing evacuation arrangements and placing food, medical supplies and water-treatment materials in secure locations.\u003c/p\u003e\n\u003cp\u003eResidents were advised not to walk, drive or ride through flooded roads, bridges or fast-moving waterways. Authorities were also asked to clear blocked drains, culverts and waterways, while community volunteers and local communication networks should help circulate warnings.\u003c/p\u003e\n\u003ch2\u003eRepeated alerts keep preparedness pressure high\u003c/h2\u003e\n\u003cp\u003eThe latest advisory follows a separate NIHSA warning covering July 14 to July 20, when 14 states were assessed as facing a medium risk of localised flooding. Several states, including Bauchi, Benue, Borno, Edo, Imo, Kaduna, Niger and Plateau, appeared in both advisories.\u003c/p\u003e\n\u003cp\u003eThe Federal Ministry of Environment has also recently warned that heavy rainfall could cause flooding across a wider group of states and the Federal Capital Territory. The overlapping alerts increase pressure on authorities to act before rising water forces evacuations or disrupts essential services.\u003c/p\u003e\n\u003cp\u003eNIHSA advised residents and emergency agencies to follow its daily flood bulletins because river conditions can change during the seven-day alert period. Communities near waterways and low-lying areas face the most immediate need to monitor warnings and relocate where authorities determine that conditions are unsafe.\u003c/p\u003e"}}},{"id":"06","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/7QBEUGhvdG9zaG9wIDMuMAA4QklNBAQAAAAAACgcAigAIkZCTUQzMDAwMDIyMDAyMDAwMDE0ZTQwMDAwMDQzZjAxMDAA/9sAQwAFAwQEBAMFBAQEBQUFBgcMCAcHBwcPCwsJDBEPEhIRDxERExYcFxMUGhURERghGBodHR8fHxMXIiQiHiQcHh8e/9sAQwEFBQUHBgcOCAgOHhQRFB4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4e/8AAEQgBqgKAAwEiAAIRAQMRAf/EAB0AAAAHAQEBAAAAAAAAAAA TVG4t71ZLTsaNBssKlkS7gIWs5h1vD1chKvMpUnUjcxV54lM44EkgX2EeZdcuBzF2zD70FRUE7rNJTncOVzkKfLIHjAMPmqdJuBSswNhe0VJlxzT7RXzibkFq5KvEdu8amm6FVEbxrnKmVUqTcbQQi2msM3pKWbI8AsdoeyRJlxqdj+UM5/8AhD1ibRYrFG9+fLmTB8MJVZKRCTSQpy6U/C0Jr/iw4b0l3iNCBEi47IjbK1IVpLJlgKhPiXYTqW2/eWe0QArTC3g1T6awyhOiX3wVKHn2iJmFqcqgDiisZjoo3i3UZprmtfZo90fdECIzJVylrXZQDr1Pv5e5FxC2CIF3e+Q/PVO6fSl1NsPz8xMzebYnwp+QidkMJyDTZWuUBsbnPrp8YsOH0p9lHhHvdoQxAtYeXZShr3jaQL2AXIT4lO+UxtNgqni2kyzFKdQy0lF/dsLRnPsTtwrKSCfnGrVPxSTubxeHrFUlUpMw4CkEBxNtPOKZKOOezncl0OE1b2wm+qb02hPKCV2tcXtaCVqizCAChsqUO0aNRkIuBlTt2g1cbbD7dkJ69I2xxt/x20WJuLzce1lkrVMKllK3A2u1xfp6waXCGkEIJKt1G0P61o5N20s5pEcj3B6R5z26rnQEUcQsCLk8z5L0zszTiY+0POo2HRKpNyYTeAvePDc+ked2EeYjddq83CQOX4wKekFO8CIsKxjdf//Z","versions":{"A":{"headline":"Nigeria Completes Design of $500 Million AGROW Programme as Financing Steps Remain","contentHtml":"\u003ch2\u003eKey Points\u003c/h2\u003e\n\u003cp\u003eVice President Kashim Shettima received the final design report for Nigeria’s $500 million World Bank-supported Sustainable Agricultural Value Chains for Growth Programme, known as AGROW, at the Presidential Villa in Abuja on Tuesday. The government says the programme is moving from design toward implementation, with $355 million, or 71% of the financing, to be delivered through participating states. Borrowing, financing and legal processes must still be completed before full implementation begins.\u003c/p\u003e\n\u003cp\u003eShettima formally accepted the report and dissolved the National Technical Working Group that designed the programme, transferring responsibility to the Federal Ministry of Agriculture and Food Security. The ministry will chair the National Steering Committee and host the Project Coordination Office.\u003c/p\u003e\n\u003ch2\u003eStates Will Lead Programme Delivery\u003c/h2\u003e\n\u003cp\u003eAGROW was designed through seven zonal consultations involving 32 states. Shettima said placing most of the financing under state-level implementation reflects the fact that agricultural production, infrastructure, extension services and market development largely operate at state and local levels.\u003c/p\u003e\n\u003cp\u003eThe programme is intended to bring farmers’ realities more directly into national economic planning and attract private investment to help move agriculture from subsistence production toward commercial scale. Its designers also developed an eight-indicator framework for selecting priority agricultural value chains according to agroecological conditions such as soil, rainfall and crop suitability.\u003c/p\u003e\n\u003cp\u003eNasarawa State Governor Abdullahi Sule said state governments supported the initiative. Kaduna State Deputy Governor Hadiza Balarabe said her state would establish a coordination mechanism for AGROW, noting that Kaduna already allocates more than 13% of its annual budget to agriculture.\u003c/p\u003e\n\u003ch2\u003eFinancing Steps Remain Before Full Implementation\u003c/h2\u003e\n\u003cp\u003eAlthough the government described acceptance of the report as the transition from design to implementation, Agriculture and Food Security Minister Abubakar Kyari said the next phase still includes a borrowing plan, financing agreements and required legal processes. The programme framework has therefore been accepted and implementation responsibility transferred, but its full financing and activities have not yet been activated.\u003c/p\u003e\n\u003cp\u003eShettima said the $500 million package would still be insufficient to close decades-old gaps in agricultural infrastructure, technology, processing, extension services and market access. World Bank AGROW Programme Leader Bertine Kamphuis reaffirmed the bank’s support while stressing that greater private-sector participation and an enabling policy environment would be needed to expand the programme’s impact.\u003c/p\u003e\n\u003ch2\u003eAgriculture Is Central to the Wider Reform Agenda\u003c/h2\u003e\n\u003cp\u003eShettima said agriculture accounts for about 23% of Nigeria’s gross domestic product and supports roughly 34% of its workforce. The government expects higher agricultural productivity to strengthen food security, ease pressure on food prices, improve rural incomes and employment, and increase the supply of raw materials to industry.\u003c/p\u003e\n\u003cp\u003eOfficials also linked AGROW to macroeconomic stability, poverty reduction and broader economic transformation. Those gains, however, will depend on completing the financing and legal steps and converting the programme’s design into investments and services through cooperation among the federal government, participating states, the World Bank and private investors.\u003c/p\u003e"},"B":{"headline":"Nigeria Advances $500 Million AGROW Agriculture Programme","contentHtml":"\u003cp\u003eNigeria has moved its $500 million Sustainable Agricultural Value Chains for Growth programme, known as AGROW, toward implementation after Vice President Kashim Shettima received its final design report at the Presidential Villa in Abuja.\u003c/p\u003e\n\u003cp\u003eThe World Bank-supported programme is intended to connect farmers more closely with national economic planning and help shift agriculture from subsistence production toward commercial scale. Its design drew on seven regional consultations involving 32 states, as well as input from federal and state governments, development partners and the private sector.\u003c/p\u003e\n\u003cp\u003eShettima said $355 million, or 71% of the financing package, would be implemented through participating states, reflecting their central role in agricultural production, infrastructure, extension services and market development.\u003c/p\u003e\n\u003cp\u003eHe cautioned, however, that the funding would not be sufficient to close longstanding gaps across the sector, including inadequate infrastructure, weak extension services, limited technology adoption and restricted access to processing and markets.\u003c/p\u003e\n\u003cp\u003eAgriculture accounts for about 23% of Nigeria’s gross domestic product and supports roughly 34% of its workforce, according to figures presented by the government. Officials expect higher productivity to strengthen food security, ease pressure on food prices, raise rural incomes, create jobs and supply more raw materials to industry.\u003c/p\u003e\n\u003cp\u003eThe final report includes an eight-indicator framework for selecting priority agricultural value chains according to agroecological conditions such as soil, rainfall and crop suitability. The government said the approach is designed to align investment in each state with local production potential.\u003c/p\u003e\n\u003cp\u003eWith the report accepted, the National Technical Working Group that designed AGROW has been dissolved. Responsibility has passed to the Federal Ministry of Agriculture and Food Security, which will chair the National Steering Committee and host the Project Coordination Office.\u003c/p\u003e\n\u003cp\u003eNasarawa State Governor Abdullahi Sule said state governments supported the initiative. Kaduna State Deputy Governor Hadiza Balarabe pledged to establish a state coordination mechanism and said Kaduna already allocates more than 13% of its annual budget to agriculture.\u003c/p\u003e\n\u003cp\u003eWorld Bank AGROW Programme Leader Bertine Kamphuis reaffirmed the institution’s support and called for greater private-sector participation across agricultural value chains. She said supportive policies and an enabling investment environment would be important to improving food security and reducing poverty.\u003c/p\u003e\n\u003cp\u003eAlthough the handover was presented as a transition to implementation, full execution still requires a borrowing plan, financing agreements and related legal processes. The Agriculture Ministry will lead those steps and coordinate participating states as the programme moves from its completed design into specific investments.\u003c/p\u003e"},"C":{"headline":"Nigeria Moves $500 Million AGROW Programme Toward Implementation","contentHtml":"\u003cp\u003eNigeria has accepted the final design report for a World Bank-supported $500 million agricultural programme, transferring responsibility to the Federal Ministry of Agriculture and Food Security as the government prepares financing and legal steps needed for full implementation.\u003c/p\u003e\n\u003cp\u003eVice President Kashim Shettima received the report on Tuesday at the Presidential Villa in Abuja and dissolved the National Technical Working Group that designed the Sustainable Agricultural Value Chains for Growth Programme, known as AGROW.\u003c/p\u003e\n\u003cp\u003eShettima said the transition was intended to place farmers more firmly within national economic planning and create an agricultural system capable of attracting private investment and expanding production beyond subsistence farming.\u003c/p\u003e\n\u003cp\u003eThe programme was shaped through seven zonal consultations involving 32 states. An eight-indicator framework will be used to identify priority agricultural value chains by matching crops and investments with factors including soil quality, rainfall and local growing conditions.\u003c/p\u003e\n\u003ch2\u003eStates will control most programme spending\u003c/h2\u003e\n\u003cp\u003eParticipating state governments are expected to implement $355 million, or 71 percent, of the total financing package. The federal government said the arrangement reflects the central role of states and local communities in agricultural production, infrastructure, extension services and market development.\u003c/p\u003e\n\u003cp\u003eThe participating states have not been individually identified in the supplied programme reports, and officials acknowledged that the available funding would not resolve decades of deficits across the sector. Shettima cited limited technology adoption, weak extension services, inadequate processing capacity and poor market access among the problems requiring further investment.\u003c/p\u003e\n\u003cp\u003eState officials pledged support for the programme. Nasarawa Governor Abdullahi Sule said governors had been briefed on its objectives, while Kaduna Deputy Governor Hadiza Balarabe said her state would establish a coordination mechanism for implementation. She said Kaduna already directs more than 13 percent of its annual budget to agriculture.\u003c/p\u003e\n\u003ch2\u003eThe programme targets food costs and rural incomes\u003c/h2\u003e\n\u003cp\u003eThe government is presenting AGROW as part of its effort to raise farm productivity, strengthen food security and support employment. Agriculture accounts for about 23 percent of Nigeria’s gross domestic product and provides livelihoods for roughly 34 percent of its workforce, according to figures cited by Shettima.\u003c/p\u003e\n\u003cp\u003eHigher yields could ease food prices, improve rural incomes and increase supplies of raw materials for industry, the vice president said. World Bank AGROW Programme Leader Bertine Kamphuis also called for stronger private-sector participation and policies that encourage investment across agricultural value chains.\u003c/p\u003e\n\u003cp\u003eThe handover does not complete all preparations needed before funds can be deployed. Agriculture Minister Abubakar Kyari said the next phase includes work on the borrowing plan, financing agreement and required legal processes.\u003c/p\u003e\n\u003cp\u003eThe Agriculture Ministry will chair the National Steering Committee and host the Project Coordination Office. Its immediate task will be to complete those arrangements and turn the framework developed with states, businesses and development partners into operational projects.\u003c/p\u003e"}}},{"id":"07","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4e
