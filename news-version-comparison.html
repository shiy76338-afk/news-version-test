Ikorodu Federal Constituency. Benson said previous condemnations and diplomatic engagements lacked a comprehensive assessment of casualties, property destruction and cumulative economic losses, weakening Nigeria’s basis for seeking justice and compensation for affected citizens.\u003c/p\u003e\n\u003ch2\u003eLawmakers Seek Evidence to Support Compensation Claims\u003c/h2\u003e\n\u003cp\u003eThe House directed a group of committees covering African integration, diaspora affairs, the Nigeria–South Africa Friendship Group and foreign affairs to investigate Nigerians killed, injured or displaced in previous and recent attacks and to compile an inventory of abandoned property.\u003c/p\u003e\n\u003cp\u003eThe inquiry will also examine diplomatic initiatives, legal mechanisms and bilateral arrangements that could hold perpetrators accountable, improve protection for Nigerian residents and support compliance with relevant international human rights obligations. The committees were given four weeks to report for further legislative action.\u003c/p\u003e\n\u003cp\u003eLawmaker Paschal Agbodike argued that Nigerians repatriated from South Africa should receive adequate compensation for their financial and psychological trauma. However, the House has opened an investigation and requested recommendations; it has not approved a specific compensation program, identified who would pay or set an amount.\u003c/p\u003e\n\u003cp\u003eBenson cited major outbreaks of xenophobic violence in 2008, 2015, 2017, 2019 and 2021 that he said caused deaths, destroyed businesses and property, displaced residents and renewed diplomatic tensions between Nigeria and South Africa. He also said recent anti-foreigner campaigns and inflammatory rhetoric had created fear in Nigerian communities, with some residents reportedly leaving homes, businesses and investments.\u003c/p\u003e\n\u003ch2\u003eNigeria Presses for a Common African Position\u003c/h2\u003e\n\u003cp\u003eAt an ECOWAS summit in Freetown, Sierra Leone, Tinubu, represented by Vice President Kashim Shettima, called on member states to collectively condemn xenophobic violence against Nigerians and other Africans and escalate the issue to the African Union.\u003c/p\u003e\n\u003cp\u003eAccording to a statement from Nigeria’s Office of the Vice President, the country has evacuated more than 1,490 citizens from South Africa in seven batches following the attacks and remains prepared to take further diplomatic steps. Tinubu said Africans must be able to live, work and invest safely in other countries if the continent is to advance mobility, trade and economic integration.\u003c/p\u003e\n\u003cp\u003eThe House inquiry will now seek to verify the number of victims, the scale of losses and the property left behind, creating an evidential basis for possible compensation demands and negotiations with South Africa. Any specific reparation arrangement or further diplomatic and legal action will depend on the joint committees’ findings and recommendations in four weeks.\u003c/p\u003e"},"B":{"headline":"Nigeria Probes Xenophobia Losses After Evacuating More Than 1,490","contentHtml":"\u003cp\u003eNigeria’s House of Representatives has opened an investigation to establish the human, property and economic losses suffered by Nigerians during successive xenophobic attacks in South Africa, while President Bola Tinubu is seeking a joint West African position and broader African Union action.\u003c/p\u003e\n\u003cp\u003eThe House adopted a motion on Tuesday sponsored by Babajimi Benson, who represents Lagos State’s Ikorodu Federal Constituency. The motion said Nigeria still lacks a comprehensive record of the people killed, injured or displaced and the value of businesses and other property destroyed or abandoned, limiting efforts to pursue compensation and stronger protections.\u003c/p\u003e\n\u003cp\u003eSpeaker Abbas Tajudeen referred the inquiry to House committees responsible for African integration, diaspora affairs, the Nigeria-South Africa Friendship Group and foreign affairs. They are to document losses from previous and recent attacks and recommend diplomatic, legal and bilateral measures to protect Nigerians in South Africa, hold perpetrators accountable and consider compensation and reparation mechanisms. The committees have four weeks to report for further legislative action.\u003c/p\u003e\n\u003cp\u003eBenson said Nigerians had faced repeated killings, assaults, arson, looting, displacement and intimidation over nearly two decades. He cited major episodes of violence in 2008, 2015, 2017, 2019 and 2021, and said renewed anti-foreigner campaigns and threats had again created fear among Nigerian residents, prompting some to leave homes, businesses and investments.\u003c/p\u003e\n\u003cp\u003eLawmaker Paschal Agbodike called for adequate compensation for Nigerians repatriated from South Africa, citing the financial and psychological harm suffered by victims. Akin Rotimi, chairman of the House Committee on Media and Public Affairs, called for a thorough investigation and accountability for anyone found responsible.\u003c/p\u003e\n\u003cp\u003eThe parliamentary inquiry comes as Tinubu urged African governments to oppose xenophobic violence collectively at the 69th Ordinary Session of the Economic Community of West African States Authority of Heads of State and Government in Freetown, Sierra Leone. Vice President Kashim Shettima represented Tinubu at the summit.\u003c/p\u003e\n\u003cp\u003eNigeria has evacuated more than 1,490 citizens from South Africa in seven batches, according to a statement from the Office of the Vice President. Tinubu asked ECOWAS to adopt a common position on the attacks and take the matter to the African Union, arguing that a united continental response would demonstrate that violence against fellow Africans is unacceptable.\u003c/p\u003e\n\u003cp\u003eTinubu also recalled the diplomatic, economic and political support Nigeria and other African countries gave South Africa during the struggle against apartheid. He said that history should encourage African governments to show greater respect for and protect Africans who live, work or conduct business beyond their home countries.\u003c/p\u003e\n\u003cp\u003eThe outcome of the House inquiry will determine whether lawmakers pursue specific compensation arrangements, legal action or new bilateral protection mechanisms. Nigeria’s government has said it remains prepared to take further diplomatic steps if its citizens continue to face threats.\u003c/p\u003e"},"C":{"headline":"Nigeria Opens Probe Into Xenophobic Attacks on Citizens in South Africa","contentHtml":"\u003cp\u003eNigeria’s House of Representatives has opened an investigation into casualties, property damage and economic losses suffered by Nigerians in xenophobic attacks in South Africa, seeking evidence that could support compensation and stronger protections.\u003c/p\u003e\n\u003cp\u003eLawmakers approved the inquiry on Tuesday after adopting a motion sponsored by Babajimi Benson, who represents Lagos State’s Ikorodu Federal Constituency and chairs the House Committee on Defence.\u003c/p\u003e\n\u003cp\u003eThe joint committees assigned to the inquiry will document Nigerians who were killed, injured or displaced, assess economic losses and compile an inventory of property abandoned during previous and recent attacks. They are expected to report back within four weeks.\u003c/p\u003e\n\u003cp\u003eThe committees will also recommend diplomatic initiatives, legal mechanisms and bilateral measures aimed at holding perpetrators accountable, protecting Nigerian residents and advancing possible reparations.\u003c/p\u003e\n\u003cp\u003eBenson told the House that repeated condemnations and diplomatic protests had not produced a comprehensive assessment of losses. Without an authoritative record, he argued, Nigeria lacked sufficient evidence for policy decisions, legislative action and sustained negotiations with South Africa.\u003c/p\u003e\n\u003ch2\u003eThe inquiry seeks a basis for compensation\u003c/h2\u003e\n\u003cp\u003eLawmakers cited recurring outbreaks of xenophobic violence since 2008, including killings, assaults, arson, looting, displacement and destruction of businesses. They also raised concern about anti-foreigner campaigns and rhetoric that have reportedly caused some Nigerians to leave homes, businesses and investments.\u003c/p\u003e\n\u003cp\u003ePaschal Agbodike, another House member, called for adequate compensation for Nigerians repatriated from South Africa, citing the financial and psychological harm suffered by victims. House media committee chairman Akin Rotimi also urged a thorough investigation and accountability for those found responsible.\u003c/p\u003e\n\u003cp\u003eThe resolution directs the government to intensify diplomatic engagement and explore legal measures while strengthening bilateral cooperation with South Africa. The inquiry’s findings are intended to give officials a clearer basis for seeking compensation and improving responses to future violence.\u003c/p\u003e\n\u003ch2\u003eNigeria presses for a continental response\u003c/h2\u003e\n\u003cp\u003eThe parliamentary action follows President Bola Tinubu’s call for African leaders to jointly oppose xenophobic violence. Represented by Vice President Kashim Shettima at an Economic Community of West African States summit in Freetown, Tinubu urged the regional bloc to adopt a common position and take the matter to the African Union.\u003c/p\u003e\n\u003cp\u003eTinubu said Nigeria had evacuated more than 1,490 citizens from South Africa in seven batches following the attacks and remained prepared to take further diplomatic steps. He argued that violence against African migrants undermined continental integration and recalled Nigeria’s diplomatic, financial and political support for South Africa’s struggle against apartheid.\u003c/p\u003e\n\u003cp\u003eThe House inquiry now shifts the Nigerian response toward documenting cumulative harm. Its four-week deadline will determine whether lawmakers can translate years of complaints into specific claims for compensation, legal action and stronger safeguards for Nigerians living in South Africa.\u003c/p\u003e"}}},{"id":"08","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/wAALCADgAOABAREA/8QAHQABAAEFAQEBAAAAAAAAAAAAAAYEBQcICQEDAv/EAFAQAAAFAwECBgoMCwkBAQAAAAABAgMEBQYRBxIhCBMxQVFhFBUXIjhxdIGTsSMyNlJUVoORlbKz0glCV2Jyc3WCktHTFiQzU2WhosHhJWP/2gAIAQEAAD8A3LAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAHzccQ02pxxZJQksmZngiIG1ocQS21EtKiyRkeSMh9AAAAAAAAAAAAAAAAAGunDvv2Raul7VBpzi25ldcNlbiDwaGS3r+fkFXwH79k3hpOVKqLynZ9CcTEU4repTWMt5Pn3bhsAAAAAAAAAAAAAAAAAA09/CN0dt6DbVbKoR0LYU4wcVbhE4oj37aU84qfwctOZat246l2xirdkPoR2KhwjcbIi9stPNnmG3IAAAAAAAAAAAAAACK3tf1mWRDKRdVxwKYRl3iHXi4xf6KC74/MQwXdfDMsCnuLat+jVisqT7V1SCjtK/iPb/wCIx1U+G1crpn2tsmlxi5uPmLd9RIGBtYtS67qldRV+vNxmHG2UstMxtom20F0EZnvMeaO6k1/S26VXBQERn3VsqZcYk5U24R9JEZHkhnql8Nq5WzT2xsqlyS5+Ilra9ZLGRbS4ZdhVBxtqv0asUZR+2dJJSGk/wd//AMRnSyb+sy94fZFq3FAqacZWhl0uMR+kg++LzkJUAAAAAAAAA/C1pQk1qMkpLeZmYNrQ4gltmSknvIy5B+wEI1S1Ms/TeknULoq7cdS/8CK33z7555EILefj5OkaaaucLW87l42n2c2dtU493GkonJbhfpciP3cn1jXaoz5tTmOTqlMkTZTisrekOm44s+szPJilATXRWJZU/Uamxb/mKiUBaj7JcJRpLOO9IzL2pZ5x5rPEsqDqJU41gTFy6AhRcQ4ozUWcbyIz3mXWIWAq6dPm0yW3OpsyRCkt70PR3jbcR4jI8kNh9I+FreltKag3i2Vy0xO43Tw3LbLqXyL/AHt/WNzNLtTbP1JpBVC16u2+pP8AjRV96+wfQts95ePkPmMTcB83FobbNbhklJbzMz3EPUKQ4glpMlJPeRkP2AAAAAw1wzJcqFwbrqdiOKbWtEdlak+8XIbQsvEZGZecWfgKVRU/QCE07MOQqFNkR8LcybKcktKeosKyM41GoQadDXNnzGIsdtO0t11ZJSReMxqpr1wtoFNS/Q9MSaqMzGy5VnS2mG/1afxz6z3eMaeVao3BdtddnVCXOrVSkK791w1OuLMz5OouotxcwmVt6CauXCknIFkVJDZ+1clbMdB+I3DLIn1K4HWq0tCVSX6BTzPlJ+WajL+BBiQs8Ce8TaJT13UFLvOlCHTL59n/AKEeuTgfaq01tbtOXRa1jkbjSuLWZeJwkF/uMHXdbVctOtvUS4qa9Tp7ODWy8nB4PkPoMusLQtquXZXGaJbtNfqM97JoZaLJ4LlPqLrGcLb4IGq9SZS7UV0WjZ5W5UrjF4+TJZf7iQv8Ce8Sayzd9 EIIuYiIVYAAAAAAAAC3XFPTS7fqNSPkiRXH/HsIM/8Aocjblq0iuXBPrEpa3HZkhbyzVvPvjyFtVV+h3DAq8Za0PQ5DbyDTuPceR1zt6emq0CnVMuSXFbex+mglf9i4AAAAAAAAAAAAAAAAh+tDyo+k9zvJ5UU136o5NAOsui7ypGk9sPK5V01r6omAAAAAAAAAAAAAAACJaiagWhp/S01C7K4zTWnD2WkmRrcdP81CSMz+bAw7evCU0YuS06nQHK/UmEz462FOlTlnsZ58DVwrS0C3Z1SuD6E/9A7S0Cx3uqVwfQn/AKNpLJ4SWjFuWtS7fRcNRdTAjoYJ5dPWW1jdkyIZ1ta4aNdFEj1qg1JioU+SnLbzR5I/5H1HvF5AAAAAAAAAAAAHxfdajsreecQ00gsqUpWCIukzGPqjrlpJBkKjP6gUTjUHg+Lf4wvnQRkPj3fNHPj/AEj+Jf8AIaocIyLRNUNSJNfj6vWc1S0NpZgsPvSMtoIt+SJsyyas8nUMbdyqh/lgsT00j+kHcqof5YLE9NI/pB3KqH+WCxPTSP6Qdyqh/lgsT00j+kM4cFmv0TSepT4dX1Ys+db05G2phh9/bbfLGFpI28byyR+IhsR3fdHPygUj+Jf8hcbZ1e0zuKpt0yiXrR5c508NMdkbC3D6EkvGT6iE8AAAAAAAAAAAaPcPjU+qPXUjTelzFxqbEZQ9USbVjsh1e9KF/mJLB45DNW/kIamech5kMhkMhkMhkMj6MuuMOJdaWpC0HlKiPBkfSQ6E8C7WJ7UC1Hbbr8knbio6E+yqVlcuPyE4f5xHuPzHzjYgAAAAAAAAAARyp2VZ1Vmuz6patEnS3ccY/IgNuOLwWCyZlk9w+Hc60/8AiNbf0Yz90O51p/8AEa2/oxn7odzrT/4jW39GM/dDudaf/Ea2/oxn7odzrT/4jW39GM/dDudaf/Ea2/oxn7odzrT/AOI1t/RjP3Q7nWn/AMRrb+jGfuh3OtP/AIjW39GM/dDudaf/ABGtv6MZ+6KujWfadFmlNpFsUanSkoNPHRoTbS8HyltJLOBfwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAH//2Q==","versions":{"A":{"headline":"NNPP Uploads 2027 Presidential Placeholder as Assembly Candidate Total Remains Unconfirmed","contentHtml":"\u003ch2\u003eKey Points\u003c/h2\u003e\n\u003cp\u003eThe New Nigeria Peoples Party (NNPP) says it has uploaded a placeholder presidential candidate and National Assembly candidates and placeholders covering Nigeria’s 36 states and the Federal Capital Territory to the Independent National Electoral Commission (INEC) nomination portal. Party chairman Agbo Major put the National Assembly total at 355, although one report’s opening said 365; without an INEC list or other official data, the exact number cannot be independently confirmed. What is confirmed is that the party has begun its 2027 nominations and that its former logo has reappeared on the INEC portal.\u003c/p\u003e\n\u003cp\u003eThe NNPP announced the developments in Abuja on Tuesday and said uploads for governorship and state House of Assembly candidates were continuing, with completion expected by August 8, 2026, before a candidate substitution period.\u003c/p\u003e\n\u003ch2\u003eThe Party Says It Caught Up With Nominations\u003c/h2\u003e\n\u003cp\u003eMajor said the party’s team uploaded 355 National Assembly candidates and placeholders despite tight time constraints, while also completing the registration of a placeholder presidential candidate. The party did not disclose the presidential placeholder’s identity, with Major saying the decision to withhold the name was deliberate.\u003c/p\u003e\n\u003cp\u003eOn the National Assembly count, several reports directly quoted the NNPP chairman as giving a total of 355. Another report used 365 in its headline and opening paragraphs but later carried the same direct quotation from Major stating 355. Without a published INEC list or confirmation from the commission explaining the 10-candidate difference, the final total cannot be established; all the accounts nevertheless agree that the party uploaded a nationwide slate that included placeholders.\u003c/p\u003e\n\u003cp\u003eThe NNPP also said uploads for governorship and state House of Assembly races had started and would continue until August 8. The party said substitutions could follow, but it did not say when its final presidential nominee would be selected.\u003c/p\u003e\n\u003ch2\u003eThe Restored Logo Reflects a Wider Leadership Dispute\u003c/h2\u003e\n\u003cp\u003eMajor said INEC had restored the NNPP’s former emblem—a basket of fruits on a map of Nigeria—to the candidate nomination portal. A separate media check of the portal confirmed that the old logo was displayed above the party’s name.\u003c/p\u003e\n\u003cp\u003eThe NNPP has faced a prolonged dispute in which rival factions claim control of the party and its identity. Major presented the logo’s restoration and the recognition of his leadership as a victory in that legal struggle, while saying earlier delays had reduced the time available to prepare candidate submissions.\u003c/p\u003e\n\u003cp\u003eHe also said the NNPP’s legal team would approach the Federal High Court to seek 10 billion naira in damages from INEC over alleged delays in complying with court orders. The damages claim is a planned legal action announced by the party; no court has ruled on liability or compensation.\u003c/p\u003e"},"B":{"headline":"Appeal Court Upholds INEC’s Power to Set 2027 Election Rules","contentHtml":"\u003cp\u003eNigeria’s Court of Appeal in Abuja on Tuesday overturned a lower-court decision that had limited the Independent National Electoral Commission’s authority to set election rules, reinforcing the commission’s powers as parties submit candidates for the 2027 general election.\u003c/p\u003e\n\u003cp\u003eA panel led by Justice Adebukola Banjoko ruled that INEC is empowered by law to issue guidelines for elections nationwide. The court said it was bound by a decision it delivered the previous week in a case between INEC and the Youth Party of Nigeria.\u003c/p\u003e\n\u003cp\u003eThe ruling reversed parts of a judgment by Federal High Court Justice James Omotosho. That case, filed by the Social Democratic Party, had resulted in restrictions on aspects of INEC’s authority over election administration and pre-election activities.\u003c/p\u003e\n\u003cp\u003eINEC argued on appeal that the 1999 Constitution and the Electoral Act give it authority to organise, supervise and conduct elections, including setting timetables and regulating political activities before polling. The appellate court accepted the commission’s position that those responsibilities include issuing election guidelines.\u003c/p\u003e\n\u003cp\u003eThe decision comes as political parties work through INEC’s candidate-submission timetable. New Nigeria Peoples Party National Chairman Agbo Major told a news conference in Abuja that the party had uploaded details of 355 National Assembly candidates, including placeholders, across Nigeria’s 36 states and the Federal Capital Territory.\u003c/p\u003e\n\u003cp\u003eMajor said the party had also uploaded a placeholder presidential candidate but declined to disclose the person’s identity. The NNPP said submissions for governorship and state House of Assembly candidates had begun and were expected to be completed by Aug. 8, before a period for candidate substitutions.\u003c/p\u003e\n\u003cp\u003eThe party also said INEC had restored the NNPP’s original emblem — a basket of fruit on a map of Nigeria — to the candidate-nomination portal. The logo had become part of a prolonged leadership dispute in which rival factions claimed control of the party and its identity.\u003c/p\u003e\n\u003cp\u003eMajor said delays by INEC in recognising the leadership supported by party founder Boniface Aniebonam had placed the NNPP under significant time pressure. He said the party had instructed its legal team to seek 10 billion naira in damages at the Federal High Court over what it described as the commission’s delayed compliance with orders to update the party’s leadership details.\u003c/p\u003e\n\u003cp\u003eThat planned lawsuit concerns a separate dispute from Tuesday’s appellate judgment: the NNPP complaint focuses on alleged delays in implementing court orders, while the Court of Appeal ruling confirms INEC’s general statutory authority to establish election guidelines.\u003c/p\u003e\n\u003cp\u003eWith parties continuing state-level submissions and preparing to replace placeholder nominees, the appellate decision leaves INEC’s rules in place as the framework for the next stages of preparations for the 2027 election.\u003c/p\u003e"},"C":{"headline":"Appeal Court Upholds INEC’s Power to Set 2027 Election Guidelines","contentHtml":"\u003cp\u003eNigeria’s Court of Appeal has upheld the Independent National Electoral Commission’s authority to issue guidelines and timetables for elections, overturning a Federal High Court decision that had restricted parts of the commission’s framework for the 2027 general election.\u003c/p\u003e\n\u003cp\u003eThe Abuja Division allowed INEC’s appeal on Tuesday, ruling that the commission’s legal mandate includes setting rules for conducting elections and managing political activities that precede voting.\u003c/p\u003e\n\u003cp\u003eJustice Adebukola Banjoko, who led the appellate panel, said the court was bound by a decision delivered the previous week in INEC v. Youth Party of Nigeria. That ruling also addressed the electoral commission’s powers.\u003c/p\u003e\n\u003cp\u003eThe appeal arose after Justice James Omotosho of the Federal High Court in Abuja granted some requests made by the Social Democratic Party and limited aspects of INEC’s authority over election preparations. INEC challenged the portions of the judgment that constrained its role.\u003c/p\u003e\n\u003cp\u003eINEC’s lawyer, Alex Izinyon, argued that the 1999 Constitution and the Electoral Act empower the commission to organise, supervise and conduct elections. He said that mandate extends to issuing election timetables and regulating pre-election political activities.\u003c/p\u003e\n\u003cp\u003eThe appellate ruling removes a legal restriction on INEC’s preparations as parties begin complying with nomination schedules for the 2027 polls. The commission’s guidelines will govern key steps before voting, including candidate filings and other pre-election processes.\u003c/p\u003e\n\u003cp\u003eThe judgment also strengthens INEC’s position in disputes over how far its rule-making authority extends. Political parties must now continue their preparations under the commission’s timetable unless the decision is overturned through a further appeal or the legal framework changes.\u003c/p\u003e"}}},{"id":"09","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4  Federal High Court in Abuja issued a final forfeiture order on December 11, 2025, directing the commission to return the land to FMBN as the institution affected by the alleged diversion.\u003c/p\u003e\n\u003cp\u003eThe original housing development was launched in 2012 to build 962 units in Abuja’s Kaba District under the proposed Goodluck Jonathan Estate. FMBN initiated the project and awarded it to Good Earth Power Nigeria Limited in partnership with a US company.\u003c/p\u003e\n\u003ch2\u003eThe Commission Alleges the Entire $65 Million Loan Was Diverted\u003c/h2\u003e\n\u003cp\u003eAliyu said Ecobank provided a $65 million loan in August 2012, with FMBN giving a partial guarantee for the 18-month facility. The money was intended to finance construction on two plots covering about 27.92 hectares.\u003c/p\u003e\n\u003cp\u003eAccording to Aliyu, the loan was fully diverted, part of it was moved abroad through bureaux de change, and no building was constructed. Those claims remain allegations by the commission about the movement of the funds; the related criminal proceedings have not been concluded.\u003c/p\u003e\n\u003cp\u003eAliyu said the ICPC opened civil and criminal cases after investigating the transaction. The court, presided over by Justice M.G. Umar, found the two plots to be property suspected of constituting proceeds of unlawful activity and ordered their final forfeiture. What is confirmed is that the land has now been legally transferred to FMBN; a determination of criminal responsibility remains before the court.\u003c/p\u003e\n\u003ch2\u003eThe Court Requires Joint Oversight of Construction\u003c/h2\u003e\n\u003cp\u003eThe court went beyond transferring the property, directing the ICPC and FMBN to supervise construction of the 962 homes through completion and ensure they reach the intended beneficiaries. The commission and the bank will establish a joint committee to verify building progress, allocation of the units and any obstacles affecting delivery.\u003c/p\u003e\n\u003cp\u003eAliyu described the development as a fresh project because the original 2012 plan had failed, leaving the site idle for years. He said recovering an asset was not sufficient unless it was properly managed and returned to productive public use.\u003c/p\u003e\n\u003cp\u003eFMBN Managing Director Shehu Osidi said the bank would move quickly to select qualified developers and begin work. The bank said the 962 homes would primarily serve National Housing Fund contributors under a new delivery model intended to improve transparency, efficiency and the prospect of completion.\u003c/p\u003e\n\u003cp\u003eThe land transfer and court-ordered supervision provide the legal and administrative basis for restarting the project, but construction has not yet been completed. The next tests will be developer selection, the start of physical work and whether the joint committee ensures the homes ultimately reach eligible beneficiaries.\u003c/p\u003e"},"B":{"headline":"ICPC Transfers Forfeited Abuja Land to Mortgage Bank to Restart Housing Project","contentHtml":"\u003cp\u003eNigeria’s anti-corruption commission has transferred 27.92 hectares of forfeited land in Abuja to the Federal Mortgage Bank of Nigeria to restart a housing project that failed after a $65 million loan was allegedly diverted.\u003c/p\u003e\n\u003cp\u003eIndependent Corrupt Practices and Other Related Offences Commission Chairman Musa Aliyu handed over the property on July 21, saying it was located along the Kubwa-Dei-Dei Expressway in Abuja’s Kaba District and had originally been designated for 962 housing units. The transfer followed a final forfeiture order issued by the Federal High Court in Abuja on Dec. 11, 2025.\u003c/p\u003e\n\u003cp\u003eThe two plots form the proposed Goodluck Jonathan Estate. Plot No. 5 measures 122,015.80 square metres and Plot No. 4 measures 157,198.30 square metres, both in Cadastral Zone D12. Aliyu said the combined area was about 27.92 hectares, roughly the size of 39 standard football fields.\u003c/p\u003e\n\u003cp\u003eHe said the Federal Mortgage Bank conceived the project in 2012 at a cost of $65 million and awarded it to Good Earth Power Nigeria Limited in partnership with an American company. Ecobank provided the loan in August 2012 under an 18-month facility, with the mortgage bank offering a partial guarantee.\u003c/p\u003e\n\u003cp\u003eAliyu said the loan was disbursed but completely diverted, leaving no building constructed on the site. Some of the funds, he said, were moved abroad through bureaux de change. The ICPC subsequently investigated the matter and began civil and criminal proceedings at the same time. The civil case has been concluded, while the criminal case remains ongoing.\u003c/p\u003e\n\u003cp\u003eAccording to Aliyu, Justice M.G. Umar ordered the final forfeiture of the plots as property suspected to be proceeds of unlawful activity and directed the ICPC to hand them to the Federal Mortgage Bank as the affected institution. The court also ordered both institutions to monitor and supervise construction of the 962 homes through completion and ensure they reach the intended beneficiaries.\u003c/p\u003e\n\u003cp\u003eAliyu said the ICPC would immediately establish a joint committee with the mortgage bank, with defined responsibilities and reporting timelines. The commission’s Constituency and Executive Project Tracking Division will represent it on the committee. The group will verify that construction progresses, confirm that homes reach genuine end users and report obstacles as they arise.\u003c/p\u003e\n\u003cp\u003eHe said asset recovery should not end with investigation or prosecution. Recovered property must be properly managed and returned to public use, he said, warning that idle or mismanaged assets could create the impression that “corruption still pays.”\u003c/p\u003e\n\u003cp\u003eFederal Mortgage Bank Managing Director Shehu Osidi welcomed the recovery and said the bank would move quickly to appoint competent developers. He said the estate would use a new delivery model and primarily target National Housing Fund contributors. The site had remained idle for years after the original project collapsed; the new oversight arrangement will determine whether construction proceeds as promised.\u003c/p\u003e"},"C":{"headline":"ICPC Transfers Forfeited Abuja Land to Revive 962-Home Project","contentHtml":"\u003cp\u003eNigeria’s anti-corruption commission has transferred 27.92 hectares of forfeited land in Abuja to the Federal Mortgage Bank of Nigeria, clearing the way for a fresh attempt to build 962 homes on the long-idle site.\u003c/p\u003e\n\u003cp\u003eThe Independent Corrupt Practices and Other Related Offences Commission handed the property to FMBN Managing Director Shehu Osidi on Tuesday. The site, along the Kubwa-Dei-Dei Expressway in Kaba District, had been designated for the proposed Goodluck Jonathan Estate.\u003c/p\u003e\n\u003cp\u003eThe transfer followed a final forfeiture order issued by the Federal High Court in Abuja on Dec. 11, 2025. ICPC Chairman Musa Aliyu said the court directed the commission to return the two plots to FMBN and ordered both institutions to supervise construction through completion, ensuring the homes reach their intended beneficiaries.\u003c/p\u003e\n\u003ch2\u003eA 2012 project ended without construction\u003c/h2\u003e\n\u003cp\u003eFMBN initiated the housing project in 2012 at an estimated cost of $65 million and awarded it to Good Earth Power Nigeria Limited in partnership with a United States company, according to Aliyu. Ecobank provided a loan for the development, backed by a partial guarantee from FMBN and intended to finance construction within 18 months.\u003c/p\u003e\n\u003cp\u003eAliyu alleged that the loan was entirely diverted, including funds moved through bureaux de change and transferred abroad, while no homes were built. The commission subsequently opened civil and criminal proceedings. The civil case resulted in the forfeiture of the property, while the criminal case remains pending.\u003c/p\u003e\n\u003cp\u003eThe two plots, identified as plots 4 and 5 in Cadastral Zone D12, measure a combined 279,214.10 square metres. They had remained unused for years after the original development collapsed.\u003c/p\u003e\n\u003cp\u003eAliyu said the court treated the plots as property suspected to be proceeds of unlawful activity and identified FMBN as the institution affected by the alleged diversion. He said the recovery should return the asset to productive public use rather than leave it idle after the legal proceedings.\u003c/p\u003e\n\u003ch2\u003eJoint committee will oversee renewed construction\u003c/h2\u003e\n\u003cp\u003eICPC and FMBN will establish a joint committee with defined responsibilities and reporting deadlines to implement the court order. The committee will monitor construction, confirm that completed units are allocated to genuine beneficiaries and report obstacles that could delay the project.\u003c/p\u003e\n\u003cp\u003eFMBN will seek new qualified developers and use a different delivery model for the revived estate, Osidi said. He pledged that the bank would move quickly to begin construction and deliver the development transparently and efficiently.\u003c/p\u003e\n\u003cp\u003eThe planned homes will primarily serve contributors to Nigeria’s National Housing Fund, a public scheme designed to support access to housing finance. Osidi said the estate would also support wider federal efforts to expand the supply of affordable homes and homeownership opportunities.\u003c/p\u003e\n\u003cp\u003eNo construction timetable or developer selection schedule was announced. The next test will be whether the joint oversight arrangement can turn the recovered land into the 962 homes first promised more than a decade ago.\u003c/p\u003e"}}},{"id":"10","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnR ons, making independent verification difficult.\u003c/p\u003e\n\u003ch2\u003eAtiku Demands the Beneficiaries Be Identified\u003c/h2\u003e\n\u003cp\u003eAtiku said he did not oppose legitimate government support for projects connected to religious or community institutions, but argued that any use of public money must be openly identified, lawfully appropriated and subject to scrutiny.\u003c/p\u003e\n\u003cp\u003eHe said churches and mosques in Nigeria generally operate as incorporated trustees with distinct legal identities, giving citizens the right to know which institutions would receive funding, where the projects would be carried out, what purposes they would serve and which government agencies would implement them.\u003c/p\u003e\n\u003cp\u003eAtiku accused President Bola Tinubu’s administration of using religion to shield opaque public expenditure and said the presidency should immediately release the full details if the projects genuinely serve the public interest. The material contained no federal government response to his allegations or disclosure demands.\u003c/p\u003e\n\u003ch2\u003eThe Allocation Gap Raises Fairness Concerns\u003c/h2\u003e\n\u003cp\u003eNorthern Christian Association Chairman Rev. Joseph Hayab said in a statement released Monday that the group did not object to government support for faith-based organizations, but insisted that such spending must meet standards of fairness, equity and transparency.\u003c/p\u003e\n\u003cp\u003eCiting the budget figures, the association said about ₦1.91 billion was proposed for seven church projects, compared with roughly ₦6.14 billion for 52 mosque projects. Hayab argued that the disparity could reinforce perceptions of unequal government treatment, deepen distrust and weaken national unity.\u003c/p\u003e\n\u003cp\u003eThe association stressed that its position was not directed against Islam, Christianity or government partnerships with religious organizations. It called on the federal government to explain the basis of the allocations and revise them if necessary. Tracka’s reported total and breakdown are established in the accounts; the specific beneficiaries, locations, implementation arrangements, legal basis and allocation criteria still require government clarification.\u003c/p\u003e"},"B":{"headline":"Nigeria’s 8.05 Billion Naira Religious Projects Budget Draws Scrutiny","contentHtml":"\u003cp\u003eFormer Nigerian Vice President and African Democratic Congress presidential candidate Atiku Abubakar has demanded full disclosure of about 8.05 billion naira allocated to religious projects in the proposed 2026 federal budget, as the Northern Christian Association also raised questions about transparency and the distribution of the funds.\u003c/p\u003e\n\u003cp\u003eAn analysis of the budget items by public accountability organisation Tracka identified about 1.91 billion naira for seven church-related projects and roughly 6.14 billion naira for 52 mosque-related projects. Reports on the allocations said some line items did not adequately identify beneficiary religious institutions, project locations, implementing agencies or the legal basis for the spending.\u003c/p\u003e\n\u003cp\u003eIn a statement issued Tuesday through his senior special assistant on public communication, Phrank Shaibu, Atiku called on the government to publish the name of every beneficiary church and mosque, along with each project\u0026#39;s location, purpose and implementing agency. Without those details, he argued, the public would struggle to independently verify where and how the money would be spent.\u003c/p\u003e\n\u003cp\u003eAtiku said his objection was not to legitimate government support for projects involving religious or community institutions, but that such spending must be lawfully appropriated, clearly identified and open to public scrutiny. “Faith must never become a camouflage for opaque budgeting,” he said.\u003c/p\u003e\n\u003cp\u003eThe Northern Christian Association broadened the dispute by questioning the balance of the allocations. Its chairman, the Rev. Joseph Hayab, said the association did not oppose government support for religious projects but maintained that public spending should meet standards of fairness, equity and transparency.\u003c/p\u003e\n\u003cp\u003eThe association noted that the proposed 6.14 billion naira for mosque-related projects was substantially higher than the 1.91 billion naira for church-related projects. It warned that policies perceived as favouring one religious group could deepen distrust and social divisions, and called on the government to explain the basis of the distribution and review the allocations where necessary.\u003c/p\u003e\n\u003cp\u003eThe controversy concerns not only whether the government should finance religiously linked construction, but also whether budget descriptions provide enough information for taxpayers to confirm that projects exist, identify their beneficiaries and track their implementation.\u003c/p\u003e\n\u003cp\u003eBoth Atiku and the Northern Christian Association are seeking further disclosure from the federal government. The next step will depend on whether officials identify the beneficiaries, locations, executing agencies and legal authority for the projects, or revise the allocations during the budget process.\u003c/p\u003e"},"C":{"headline":"Atiku Demands Disclosure of ₦8.05 Billion Religious Projects in 2026 Budget","contentHtml":"\u003cp\u003eFormer Vice President Atiku Abubakar has called on Nigeria’s federal government to publish full details of a reported ₦8.05 billion allocation for church- and mosque-related projects in the 2026 budget, arguing that many beneficiaries and project locations have not been clearly identified.\u003c/p\u003e\n\u003cp\u003eAtiku, the African Democratic Congress presidential candidate, said the Presidency should disclose the beneficiary institutions, locations, implementing agencies and legal basis for the spending. His statement was issued on Tuesday by his senior special assistant on public communication, Phrank Shaibu.\u003c/p\u003e\n\u003cp\u003eThe figures cited by Atiku came from an analysis by public accountability organisation Tracka. It identified about ₦1.91 billion for seven church projects and roughly ₦6.14 billion for 52 mosque-related projects.\u003c/p\u003e\n\u003cp\u003eAtiku said broad descriptions attached to some line items were insufficient for independent verification. He argued that religious organisations generally have distinct legal identities as incorporated trustees, making it possible—and necessary—for the government to specify which institutions would receive public support.\u003c/p\u003e\n\u003cp\u003e“Faith must never become a camouflage for opaque budgeting,” Atiku said, adding that legitimate projects should be openly identified and executed under public scrutiny.\u003c/p\u003e\n\u003ch2\u003eDisclosure concerns widen into an equity dispute\u003c/h2\u003e\n\u003cp\u003eThe Northern Christian Association also questioned the allocations, focusing on the difference between the amounts and number of projects assigned to churches and mosques.\u003c/p\u003e\n\u003cp\u003eThe association’s chairman, Rev. Joseph Hayab, said it did not oppose government support for faith-based projects but wanted such spending to meet standards of fairness, equity and transparency. He warned that allocations perceived as favouring one religious group could deepen distrust and weaken national cohesion.\u003c/p\u003e\n\u003cp\u003e“Government should not be seen to promote policies that suggest preferential treatment for one religious group over another,” Hayab said. The association called for the basis of the allocations to be clarified and reviewed where necessary.\u003c/p\u003e\n\u003cp\u003eAtiku framed his criticism primarily as an accountability issue rather than an objection to religious or community projects. He said public expenditure involving churches or mosques should be subject to the same disclosure expectations applied to roads, schools, hospitals and other infrastructure, where locations and intended beneficiaries are normally stated.\u003c/p\u003e\n\u003cp\u003eThe controversy leaves the government facing two related demands: identification of the institutions and agencies connected to the projects, and an explanation of how the distribution was determined. Publishing those details would allow citizens to verify whether the appropriations serve identifiable public purposes and whether the funding was allocated equitably.\u003c/p\u003e"}}}]</script>
  <script>
    (() => {
      "use strict";

      const articles = JSON.parse(document.getElementById("articleData").textContent);
      const versions = ["A", "B", "C"];
      const storageKey = "english-abc-mobile-reader-v1";
      const elements = {
        progressText: document.getElementById("progressText"),
        articleTabs: [...document.querySelectorAll(".article-tab")],
        versionTabs: [...document.querySelectorAll(".version-tab")],
        headline: document.getElementById("headline"),
        articleImage: document.getElementById("articleImage"),
        articleContent: document.getElementById("articleContent"),
        previousButton: document.getElementById("previousButton"),
        nextButton: document.getElementById("nextButton"),
      };

      const emptyState = () => ({
        articleIndex: 0,
        activeVersions: {},
        scrollPositions: {},
      });

      function loadState() {
        try {
          const saved = localStorage.getItem(storageKey);
          return saved ? { ...emptyState(), ...JSON.parse(saved) } : emptyState();
        } catch {
          return emptyState();
        }
      }

      let state = loadState();
      state.articleIndex = Math.min(
        Math.max(Number(state.articleIndex) || 0, 0),
        articles.length - 1,
      );
      let scrollTimer;

      function currentArticle() {
        return articles[state.articleIndex];
      }

      function ensureArticleState(id) {
        state.activeVersions[id] ||= "A";
        state.scrollPositions[id] ||= { A: 0, B: 0, C: 0 };
      }

      function saveState() {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch {
          // Keep the current session usable when storage is unavailable.
        }
      }

      function saveCurrentScroll() {
        const article = currentArticle();
        ensureArticleState(article.id);
        const version = state.activeVersions[article.id];
        state.scrollPositions[article.id][version] = Math.max(0, window.scrollY);
      }

      function renderArticleTabs() {
        const selectedId = currentArticle().id;
        elements.articleTabs.forEach((button) => {
          const selected = button.dataset.articleId === selectedId;
          button.setAttribute("aria-selected", String(selected));
          button.tabIndex = selected ? 0 : -1;
          button.setAttribute("aria-label", "Article " + button.dataset.articleId);
          if (selected) {
            requestAnimationFrame(() =>
              button.scrollIntoView({ block: "nearest", inline: "center", behavior: "auto" }),
            );
          }
        });
      }

      function renderVersionTabs() {
        const article = currentArticle();
        const selectedVersion = state.activeVersions[article.id];
        elements.versionTabs.forEach((button) => {
          const selected = button.dataset.version === selectedVersion;
          button.setAttribute("aria-selected", String(selected));
          button.tabIndex = selected ? 0 : -1;
          button.setAttribute("aria-label", "Version " + button.dataset.version);
        });
      }

      function renderVersion(restoreScroll = true) {
        const article = currentArticle();
        ensureArticleState(article.id);
        const version = state.activeVersions[article.id];
        const content = article.versions[version];
        elements.headline.textContent = content.headline;
        elements.articleImage.src = article.imageDataUrl;
        elements.articleImage.alt = "News image for: " + content.headline;
        elements.articleContent.innerHTML = content.contentHtml;
        renderVersionTabs();

        if (restoreScroll) {
          const target = state.scrollPositions[article.id][version] || 0;
          requestAnimationFrame(() => window.scrollTo({ top: target, behavior: "auto" }));
        }
      }

      function renderArticle(restoreScroll = true) {
        const article = currentArticle();
        ensureArticleState(article.id);
        elements.progressText.textContent =
          "Article " + article.id + " of " + articles.length;
        elements.previousButton.disabled = state.articleIndex === 0;
        elements.nextButton.disabled = state.articleIndex === articles.length - 1;
        renderArticleTabs();
        renderVersion(restoreScroll);
        saveState();
      }

      function switchArticle(id) {
        const nextIndex = articles.findIndex((article) => article.id === id);
        if (nextIndex < 0 || nextIndex === state.articleIndex) return;
        saveCurrentScroll();
        state.articleIndex = nextIndex;
        ensureArticleState(currentArticle().id);
        saveState();
        renderArticle(true);
      }

      function switchVersion(version) {
        const article = currentArticle();
        if (state.activeVersions[article.id] === version) return;
        saveCurrentScroll();
        state.activeVersions[article.id] = version;
        saveState();
        renderVersion(true);
      }

      function navigate(delta) {
        const nextIndex = state.articleIndex + delta;
        if (nextIndex < 0 || nextIndex >= articles.length) return;
        switchArticle(articles[nextIndex].id);
      }

      elements.articleTabs.forEach((button) => {
        button.addEventListener("click", () => switchArticle(button.dataset.articleId));
        button.addEventListener("keydown", (event) => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const direction = event.key === "ArrowRight" ? 1 : -1;
          const nextIndex =
            (state.articleIndex + direction + articles.length) % articles.length;
          switchArticle(articles[nextIndex].id);
          document.querySelector('[data-article-id="' + articles[nextIndex].id + '"]').focus();
        });
      });

      elements.versionTabs.forEach((button) => {
        button.addEventListener("click", () => switchVersion(button.dataset.version));
        button.addEventListener("keydown", (event) => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const currentVersion = state.activeVersions[currentArticle().id];
          const currentIndex = versions.indexOf(currentVersion);
          const direction = event.key === "ArrowRight" ? 1 : -1;
          const nextVersion =
            versions[(currentIndex + direction + versions.length) % versions.length];
          switchVersion(nextVersion);
          document.querySelector('[data-version="' + nextVersion + '"]').focus();
        });
      });

      elements.previousButton.addEventListener("click", () => navigate(-1));
      elements.nextButton.addEventListener("click", () => navigate(1));

      window.addEventListener("scroll", () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          saveCurrentScroll();
          saveState();
        }, 80);
      }, { passive: true });

      window.addEventListener("pagehide", () => {
        saveCurrentScroll();
        saveState();
      });

      ensureArticleState(currentArticle().id);
      renderArticle(true);
    })();
  </script>
</body>
</html>
