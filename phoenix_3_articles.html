<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>Compare English Versions A/B/C</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #66717f;
      --line: #dce2e8;
      --soft: #f3f6f8;
      --paper: #ffffff;
      --accent: #174f7a;
      --shadow: 0 7px 24px rgba(19, 38, 56, 0.09);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: auto; }
    body {
      margin: 0;
      background: #eef2f5;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 17px;
      line-height: 1.68;
      -webkit-text-size-adjust: 100%;
    }
    button { font: inherit; touch-action: manipulation; }
    .shell {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--paper);
    }
    .sticky-panel {
      position: sticky;
      z-index: 20;
      top: 0;
      padding: max(10px, env(safe-area-inset-top)) 16px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
    }
    .progress {
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .article-tabs {
      display: flex;
      gap: 8px;
      margin: 0 -4px 10px;
      padding: 2px 4px 4px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scroll-snap-type: x proximity;
      scrollbar-width: none;
    }
    .article-tabs::-webkit-scrollbar { display: none; }
    .article-tab {
      flex: 0 0 46px;
      min-height: 40px;
      scroll-snap-align: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--paper);
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
      cursor: pointer;
    }
    .article-tab[aria-selected="true"] {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .version-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 4px;
      border-radius: 13px;
      background: var(--soft);
    }
    .version-tab {
      min-height: 46px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
    }
    .version-tab[aria-selected="true"] {
      background: var(--paper);
      color: var(--accent);
      box-shadow: 0 2px 9px rgba(23, 79, 122, 0.13);
    }
    .instruction {
      margin: 0;
      padding: 18px 20px 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
    }
    .article {
      padding: 18px 20px 24px;
    }
    .article h1 {
      margin: 0 0 24px;
      font-size: clamp(27px, 7vw, 38px);
      line-height: 1.18;
      letter-spacing: -0.025em;
    }
    .article-image {
      display: block;
      width: 100%;
      height: auto;
      max-height: 520px;
      margin: 0 0 24px;
      border-radius: 14px;
      background: var(--soft);
      object-fit: cover;
    }
    .article-content h2 {
      margin: 30px 0 9px;
      font-size: 19px;
      line-height: 1.35;
    }
    .article-content p { margin: 0 0 19px; }
    .article-nav {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px calc(24px + env(safe-area-inset-bottom));
    }
    .nav-button {
      min-height: 52px;
      border: 1px solid #bac5cf;
      border-radius: 12px;
      background: var(--paper);
      color: var(--ink);
      font-weight: 750;
      cursor: pointer;
    }
    .nav-button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .nav-button:disabled {
      cursor: not-allowed;
      opacity: 0.42;
    }
    button:focus-visible {
      outline: 3px solid rgba(23, 79, 122, 0.24);
      outline-offset: 2px;
    }
    .noscript {
      margin: 24px;
      padding: 18px;
      border: 1px solid #e5b9b9;
      border-radius: 12px;
      background: #fff3f3;
    }
    @media (min-width: 761px) {
      body { padding: 24px 0; }
      .shell { border-radius: 20px; box-shadow: var(--shadow); overflow: clip; }
      .sticky-panel { border-radius: 20px 20px 0 0; }
      .article, .instruction { padding-left: 40px; padding-right: 40px; }
      .article-nav { padding-left: 36px; padding-right: 36px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="sticky-panel">
      <p class="progress" id="progressText">Article 01 of 3</p>
      <nav class="article-tabs" role="tablist" aria-label="Articles">
        <button class="article-tab" type="button" role="tab" data-article-id="01">01</button><button class="article-tab" type="button" role="tab" data-article-id="02">02</button><button class="article-tab" type="button" role="tab" data-article-id="03">03</button>
      </nav>
      <nav class="version-tabs" role="tablist" aria-label="Versions">
        <button class="version-tab" type="button" role="tab" data-version="A">A</button>
        <button class="version-tab" type="button" role="tab" data-version="B">B</button>
        <button class="version-tab" type="button" role="tab" data-version="C">C</button>
      </nav>
    </header>

    <p class="instruction">Here are three news stories, each presented in three writing versions: A, B, and C. Feel free to explore them all and, based on your overall experience, choose the version you think is best.</p>

    <article class="article" role="tabpanel">
      <h1 id="headline"></h1>
      <img class="article-image" id="articleImage" alt="" decoding="async">
      <div class="article-content" id="articleContent"></div>
    </article>

    <nav class="article-nav" aria-label="Article navigation">
      <button class="nav-button" id="previousButton" type="button">Previous article</button>
      <button class="nav-button primary" id="nextButton" type="button">Next article</button>
    </nav>
  </main>

 as Nigeria Widens Probe Into Unrecognised Investment Council","contentHtml":"\u003cp\u003eNigeria’s Independent Corrupt Practices and Other Related Offences Commission said presidential chief of staff Femi Gbajabiamila voluntarily answered investigators’ questions on Monday about the operations of the purported Presidential Foreign Investment Promotion Council, or PFIPC. The agency stressed that he was not arrested. Separately, a House of Representatives committee ordered the foreign affairs minister and national security adviser to appear in person on Thursday, July 23, to explain how the unrecognised organisation operated and what security authorities did after questions arose over its status.\u003c/p\u003e\n\u003cp\u003eBoth inquiries centre on the same issue: how an organisation disowned by the Presidency and alleged to have no legal authority reportedly operated for about two years from the Federal Secretariat in Abuja while presenting itself as a government body.\u003c/p\u003e\n\u003ch2\u003eThe Foreign Ministry Rejected Three Approaches\u003c/h2\u003e\n\u003cp\u003eForeign Affairs Ministry Permanent Secretary Dunoma Ahmed told the House ad hoc committee on Tuesday that the ministry never recognised the PFIPC or established an official relationship with it.\u003c/p\u003e\n\u003cp\u003eAhmed said Adeniyi Adeyemi, who presented himself as director-general of both the PFIPC and the Presidential Economic Advisory Council, approached the ministry on June 26, 2025, August 5, 2025, and June 5, 2026. He sought support for a proposed World Investment Summit in Nigeria, but the ministry rejected all three requests after finding inconsistencies in the submitted documents and correspondence.\u003c/p\u003e\n\u003cp\u003eThe ministry wrote to the Office of the National Security Adviser on October 16, 2025, seeking clarification about Adeyemi and the PFIPC. According to Ahmed’s account, the security adviser’s office replied on November 26 that checks with the Office of the Secretary to the Government of the Federation and the Office of the Chief of Staff showed that neither Adeyemi nor the council was known to the federal government.\u003c/p\u003e\n\u003cp\u003eAhmed also said the ministry did not participate in any bilateral or multilateral engagement through the PFIPC, execute any memorandum, treaty or investment agreement through it, or facilitate foreign investors, international partners or delegations on its behalf. Nigerian diplomatic missions likewise had no dealings with the organisation through the ministry.\u003c/p\u003e\n\u003ch2\u003eInvestigators Examine Its Access to Government Offices\u003c/h2\u003e\n\u003cp\u003ePresident Bola Tinubu directed the ICPC to investigate after the Presidency publicly disowned the PFIPC. The agency said the inquiry would examine how the organisation gained access to federal offices, who was responsible for its operations and whether any public officials facilitated its activities.\u003c/p\u003e\n\u003cp\u003eThe ICPC said Gbajabiamila arrived at its Abuja headquarters on Monday afternoon, answered investigators’ questions and left after the interview. It said his appearance was voluntary and followed an invitation, not an arrest.\u003c/p\u003e\n\u003cp\u003eThe PFIPC was allegedly operated by Adeyemi, who is accused of presenting himself as its director-general. The investigation remains open, and authorities have not yet established how the organisation secured space at the Federal Secretariat or whether government officials assisted it.\u003c/p\u003e\n\u003ch2\u003eLawmakers Demand Answers From Security Officials\u003c/h2\u003e\n\u003cp\u003eHouse committee chairman Yusuf Gagdi said National Security Adviser Nuhu Ribadu must explain what his office did after determining in November 2025 that the PFIPC was not recognised by the federal government. Lawmakers also ordered Foreign Affairs Minister Bianca Odumegwu-Ojukwu to appear personally and provide further explanations after she was represented by the permanent secretary.\u003c/p\u003e\n\u003cp\u003eThe committee also plans to invite the Presidential Economic Advisory Council because letterhead used by Adeyemi reportedly identified him as director-general of both that body and the PFIPC.\u003c/p\u003e\n\u003cp\u003eWhat is confirmed is that the Foreign Affairs Ministry and the Presidency did not recognise the PFIPC, the ministry rejected its three approaches, and the ICPC and the House are conducting separate inquiries. Investigators still need to establish how it operated from federal premises, what authorities did after detecting the problem and whether anyone facilitated its activities.\u003c/p\u003e"},"B":{"headline":"Nigeria Widens PFIPC Probe as ICPC Questions Gbajabiamila","contentHtml":"\u003cp\u003eNigeria’s House of Representatives has widened its investigation into the purported Presidential Foreign Investment Promotion Council, or PFIPC, as federal agencies denied recognising or working with the body and an anti-corruption agency confirmed questioning presidential Chief of Staff Femi Gbajabiamila.\u003c/p\u003e\n\u003cp\u003eThe Independent Corrupt Practices and Other Related Offences Commission said Gbajabiamila appeared by invitation at its Abuja headquarters on Monday and gave a statement about the PFIPC’s operations. He left after answering investigators’ questions and was not arrested, the commission said.\u003c/p\u003e\n\u003cp\u003eThe ICPC said President Bola Tinubu had directed it to investigate the organisation, which allegedly operated under Adeniyi Adeyemi Matthew without presidential authorisation or legal recognition. The inquiry is examining how it obtained offices within the Federal Secretariat in Abuja and whether public officials helped its activities.\u003c/p\u003e\n\u003cp\u003eSeparately, the House ad hoc committee expressed frustration that several agency heads had not personally attended its hearings. It summoned Foreign Affairs Minister Bianca Odumegwu-Ojukwu and National Security Adviser Nuhu Ribadu to appear on Thursday, July 23.\u003c/p\u003e\n\u003cp\u003eCommittee Chairman Yusuf Gagdi said lawmakers wanted to know what security authorities did after government offices determined that the PFIPC was not a lawful federal institution. The panel also criticised the finance minister for sending a representative and warned that invited officials must appear personally.\u003c/p\u003e\n\u003cp\u003eForeign Affairs Permanent Secretary Dunoma Ahmed told lawmakers that the ministry never recognised the PFIPC or arranged investors, international partners or diplomatic engagements for it. He said Adeyemi sought ministry support for a proposed World Investment Summit in Nigeria on June 26, 2025, August 5, 2025, and June 5, 2026, but all three requests were rejected after inconsistencies were found in the submitted documents.\u003c/p\u003e\n\u003cp\u003eAhmed said the ministry asked the Office of the National Security Adviser on October 16, 2025, to clarify the status of Adeyemi and the PFIPC. The office replied on November 26 that checks with the Office of the Secretary to the Government of the Federation and the president’s chief of staff showed that neither Adeyemi nor the council was known to the federal government.\u003c/p\u003e\n\u003cp\u003eThe ministry also said no memorandum of understanding, treaty or investment agreement with a foreign government had been executed through the PFIPC, and Nigerian diplomatic missions had no dealings with it.\u003c/p\u003e\n\u003cp\u003eThe House committee is now seeking to establish how an unrecognised organisation gained access to government offices and presented itself as an official body. The ICPC said its investigation remains underway and further information will be released as appropriate.\u003c/p\u003e"},"C":{"headline":"House Widens PFIPC Probe After Foreign Affairs Disavows Council","contentHtml":"\u003cp\u003eNigeria’s House of Representatives has intensified its investigation into the purported Presidential Foreign Investment Promotion Council, summoning senior officials after the Foreign Affairs Ministry said the body and its alleged director-general had no federal recognition.\u003c/p\u003e\n\u003cp\u003eThe parliamentary inquiry is examining how the PFIPC allegedly operated from the Federal Secretariat in Abuja and presented itself as an official investment agency despite lacking presidential approval or legal standing.\u003c/p\u003e\n\u003cp\u003eCommittee Chairman Yusuf Gagdi summoned National Security Adviser Nuhu Ribadu and insisted that Foreign Affairs Minister Bianca Odumegwu-Ojukwu appear personally before the panel. The committee wants to know what action authorities took after questions about the council’s legitimacy were raised.\u003c/p\u003e\n\u003cp\u003eThe panel also criticised several heads of ministries, departments and agencies for failing to honour its invitations. It said officials must attend in person or face further legislative action.\u003c/p\u003e\n\u003ch2\u003eForeign Affairs rejected three approaches\u003c/h2\u003e\n\u003cp\u003eForeign Affairs Permanent Secretary Dunoma Ahmed told lawmakers that the ministry rejected three requests from Adeniyi Adeyemi, who presented himself as director-general of the PFIPC and the Presidential Economic Advisory Council.\u003c/p\u003e\n\u003cp\u003eThe requests, dated June 26, 2025, August 5, 2025 and June 5, 2026, sought ministry support for a proposed World Investment Summit in Nigeria. Ahmed said due diligence uncovered inconsistencies in the submitted documents, prompting the ministry to withhold its endorsement.\u003c/p\u003e\n\u003cp\u003eThe ministry subsequently asked the Office of the National Security Adviser to clarify Adeyemi’s status. According to Ahmed, the NSA replied on November 26, 2025, that checks with the offices of the Secretary to the Government of the Federation and the President’s chief of staff found that Adeyemi was unknown to the federal government.\u003c/p\u003e\n\u003cp\u003eAhmed said the ministry never recognised the PFIPC, participated in diplomatic engagements involving it or facilitated investors and foreign delegations on its behalf. He also said no treaty, memorandum of understanding or investment agreement was executed through the purported council.\u003c/p\u003e\n\u003cp\u003eLawmakers questioned why stronger action was not taken after the security checks. Gagdi said the NSA must explain how his office responded after determining that the organisation was not a lawful government institution.\u003c/p\u003e\n\u003ch2\u003eICPC questions presidential chief of staff\u003c/h2\u003e\n\u003cp\u003eThe legislative scrutiny is proceeding alongside an investigation by the Independent Corrupt Practices and Other Related Offences Commission. The ICPC confirmed that presidential Chief of Staff Femi Gbajabiamila appeared at its Abuja headquarters on Monday to make a statement about the council’s operations.\u003c/p\u003e\n\u003cp\u003eThe commission stressed that Gbajabiamila was invited and was not arrested. It said he answered investigators’ questions and left after the interview.\u003c/p\u003e\n\u003cp\u003ePresident Bola Tinubu directed the ICPC to investigate how the purported council allegedly operated for about two years from government offices, identify those responsible and determine whether any public officials facilitated its activities.\u003c/p\u003e\n\u003cp\u003eThe Presidency has disowned the PFIPC as a fraudulent entity without legal backing or presidential authorisation. Adeyemi has been identified in the investigation as the person who allegedly presented himself as its director-general.\u003c/p\u003e\n\u003cp\u003eThe ICPC said its investigation remains underway and further information will be released as it progresses. The House committee’s planned questioning of the foreign affairs minister and national security adviser is expected to focus on when officials became aware of the council and what they did after doubts about its legitimacy emerged.\u003c/p\u003e"}}},{"id":"02","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAASABIAAD/4QBMRXhpZgAATU0AKgAAAAgAAYdpAAQAAAABAAAAGgAAAAAAA6ABAAMAAAABAAEAAKACAAQAAAABAAAB4KADAAQAAAABAAABDQAAAAD/7QA4UGhvdG9zaG9wIDMuMAA4QklNBAQAAAAAAAA4QklNBCUAAAAAABDUHYzZjwCyBOmACZjs+EJ+/8AAEQgBDQHgAwEiAAIRAQMRAf/EAB8AAAEFAQEBAQEBAAAAAAAAAAABAgMEBQYHCAkKC//EALUQAAIBAwMCBAMFBQQEAAABfQECAwAEEQUSITFBBhNRYQcicRQygZGhCCNCscEVUtHwJDNicoIJChYXGBkaJSYnKCkqNDU2Nzg5OkNERUZHSElKU1RVVldYWVpjZGVmZ2hpanN0dXZ3eHl6g4SFhoeIiYqSk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2drh4uPk5ebn6Onq8fLz9PX29/j5+v/EAB8BAAMBAQEBAQEBAQEAAAAAAAABAgMEBQYHCAkKC//EALURAAIBAgQEAwQHBQQEAAECdwABAgMRBAUhMQYSQVEHYXETIjKBCBRCkaGxwQkjM1LwFWJy0QoWJDThJfEXGBkaJicoKSo1Njc4OTpDREVGR0hJSlNUVVZXWFlaY2RlZmdoaWpzdHV2d3h5eoKDhIWGh4iJipKTlJWWl5iZmqKjpKWmp6ipqrKztLW2t7i5usLDxMXGx8jJytLT1NXW19jZ2uLj5OXm5+jp6vLz9PX29/j5+v/bAEMABgYGBgYGCwYGCw8LCwsPFA8PDw8UGhQUFBQUGh8aGhoaGhofHx8fHx8fHyUlJSUlJSsrKysrMDAwMDAwMDAwMP/bAEMBBwgIDAsMFQsLFTMiHCIzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzM//dAAQAHv/aAAwDAQACEQMRAD8A+ewKdiq/mN/dNO8xv7prz7M9JMkkUFSKljGEAqsZG/u08SN/doadgTVyyMU8Yqr5j/3DSiV/7lS4stNFrinLtqsJJP7hpRJJ/cNTyjuXPloytVvNk/uUvmSf3KVh3LPFOBFVfNl/uU7zJf7lFh3LXFPytVPMm/550vmTf3KVguWeKBiq3mTf3KcJJv7lOwNlninfhVYSz/3KXzp/7lOwEgA878KsjA7VniabzM7OcVN51xj/AFdOwrlwEelOGPSqSzXP/POniW57RimFy8MUoxVMS3X/ADzFOEl1/wA8xQFy4KeKpCW6/wCeY/On+bdf88xVCLgp4xVMTXX/ADzFaVgJGbzrlQEHQep/wqoq7sZ1aipx5pGjY6Y04Es3yR/qa6dIraFfl4xUAVim8HJ9KPtKAgEdOtdsIKJ8xia86zu9ive2H2omSORuOwOKwZNMIZgJ3X1yATx6V0iCN03xNioJWVcJMvI6HFU0c0W0c8llaxSbpJPMb1c9Pw6VetriKzkBLApJwy9c/Ss/ULRwzSIODzms+1b/AEmNn+Y9OegpGq1Osu9PjZftFnyp5wP6Vzs6ATJ9a6KG4exb99gox6en0qvqFm10VuLHaSOcHvWE6fVHqYXG/YqGftFUYlAvH47U8y6gOCqCqay3wuWIC5IrE9g0LoDyTxT4z8in2rPmk1AxkEJRFLqBjG3bjFAzUJ9qZu9qpeZqP+xTc6ie60BqXWNRmquNR/vLSbdRP8S0gLPNNOag8vUf76/lTTHqH99fyo0GSkmmZO4fWo/Kvu8gpgivA673BGaVhHqmkY8tfoK6QCuc0kfu1+grpVHFbmAoFOxSgU6gBlFPxRQIZim4qTFJig D0+lcHC5k8yY/eJJrt/hJZNf8AipwsrQtGsjhlAJ7L3z2NcjfU9+lD7PY1vF+mXek6wr3PlhblfOXYflBJ+Ye3POK9ItPDlt4j8H2SaaUhdFZ2baCXl5BBbsCf6Vy/xNtEttRt2OGckkvjBOQDzjioPBl/qqrc2Njc/Z1WJ7jIUMSVHTnjB4qmm4poyj7OFWUJLRnm95dTxyNG+VZSQVPUEcEVu+GNF1LW7tYrUb5GHfhVX1PoKt3OkRahqViZHYS3sjpNIedzCTG/HbOele86Z4es/DF3Bp9ozyR3qMsu48koNwPH1xjpRKbXqRDDqTt0PB76wlsrh7a8UCRSQcjIPPUHuD2Nc7fQW8zjzVBxwMDBz7Yr1P4g373WuPabVVLRREuO+QDk/nwO1cVYWkclzHeS5YJNs2dAcIWJz+GKvmvG7OWNLlrunB7Etx4JXTLW3v49Rid5lyEcHAJAOCwye/ORXF6hpmo2LLfSwkpLkh0yVYAkbh04OOKy47241TUt87HZG4Cxj7oAPTjFe8eN5mks7MLhI1d1VF4Awq/41nHXQ76vuXb3PKNN1MKGRDkSKVK5Iw3ZsDuO2a2Qz4Eu75hg7s8gitHXvDdhaaXp+pDLTXa72bpjgEAY/rXPSb7dI03bg+Tz1rWL0PPqxXMktzr9QtP+Evt1uQ6LdxIBNkfewdq4A5+bOT1xgetcppejzWetDTtVhYRyb4ZOu3ODtIYZBwcEVaguZrdlnt2KOhDKw6gitVvGl39lxeQJNLE4xJ93Ixn5gBgn5eoxxUTR2YWpzXi9y34AsGt7O4upPvPK0Y+icH8z/KvQBXO+GG36HBNjBl3yH6uxNdEK8mbvJn2FGPLTSP/Z","versions":{"A":{"headline":"31 Companies Selected for 37 Oil Blocks, Final Awards Still Conditional","contentHtml":"\u003cp\u003eThe Nigerian Upstream Petroleum Regulatory Commission said 31 companies were selected for 37 oil and gas blocks in the 2025 licensing round. The contest drew 200 bids from 143 companies, but final awards remain subject to the winners paying signature bonuses and receiving approval from the minister of petroleum resources. The regulator warned that companies could lose assets under its “drill or drop” provision if they fail to begin development promptly.\u003c/p\u003e\n\u003cp\u003eThe Nigerian Upstream Petroleum Regulatory Commission said in a statement that the results were announced at an event in Abuja on July 21, 2026. The blocks span onshore, shallow-water and deep-offshore areas in the Niger Delta, as well as frontier areas including the Benin, Anambra and Chad basins and the Benue Trough.\u003c/p\u003e\n\u003ch2\u003eMost Offered Blocks Attracted Bids\u003c/h2\u003e\n\u003cp\u003eThe commission initially offered 50 oil and gas blocks, of which 37 received bids and 13 attracted none. A total of 143 companies submitted 200 bids for the blocks that drew market interest, with 31 companies emerging from the competitive process.\u003c/p\u003e\n\u003cp\u003eThe 37 blocks that received bids were spread across all types of terrain, according to the commission. The original offer comprised 16 Niger Delta onshore blocks, 18 shallow-water blocks and one deep-offshore block, alongside three blocks in the Benin Basin and four each in the Anambra Basin, Chad Basin and Benue Trough.\u003c/p\u003e\n\u003cp\u003eThe regulator highlighted investor interest in frontier areas including the Benue Trough, Chad, Anambra and Benin basins, describing it as the first time those areas had attracted bidding on this scale. The statement did not specify how many bids each block received or identify where the 13 blocks without bids were located.\u003c/p\u003e\n\u003ch2\u003eSelection Does Not Complete the Awards\u003c/h2\u003e\n\u003cp\u003eAlthough the commission described the 31 companies as winners, they have not yet received final awards. The firms must first pay the appropriate signature bonuses, after which the awards require approval from the minister of petroleum resources under the Petroleum Industry Act 2021.\u003c/p\u003e\n\u003cp\u003eThe announcement therefore confirms the outcome of the competitive selection process, not the completion of licensing for all 37 blocks. Whether the selected companies meet the payment and approval requirements will determine if they ultimately secure the assets.\u003c/p\u003e\n\u003cp\u003eNUPRC Chief Executive Oritsemeyiwa Eyesan urged the selected companies to pay their signature bonuses without delay and begin developing the assets. She warned that companies failing to act could lose their blocks under the commission’s “drill or drop” provision, which prevents petroleum assets from being held indefinitely without development.\u003c/p\u003e\n\u003ch2\u003ePayments, Approvals and Development Come Next\u003c/h2\u003e\n\u003cp\u003eThe immediate next steps are the payment of signature bonuses and ministerial approval. Only after those conditions are met can the selected companies receive final awards and proceed with exploration and development.\u003c/p\u003e\n\u003cp\u003eThe results show that most of the offered blocks attracted market interest across both established producing regions and frontier basins. For the companies and the government, however, the practical outcome will depend on whether the provisional selections lead to completed awards, investment and activity on the ground.\u003c/p\u003e"},"B":{"headline":"Tinubu Approves Nigeria’s 2026 Oil and Gas Licensing Round","contentHtml":"\u003cp\u003eNigerian President Bola Tinubu has approved the start of a competitive 2026 oil and gas licensing round, as the government seeks new upstream investment and higher production amid fiscal pressure and questions over transparency in the petroleum market.\u003c/p\u003e\n\u003cp\u003eThe approval came a day before the Nigerian Upstream Petroleum Regulatory Commission announced that 31 companies had emerged as winners of 37 oil and gas blocks in the 2025 licensing round. The bidding exercise was held in Abuja on July 21, with 143 companies submitting 200 bids for 37 of the 50 blocks originally offered.\u003c/p\u003e\n\u003cp\u003eThe commission said the blocks receiving bids covered Niger Delta onshore, shallow-water and deep-offshore areas, as well as frontier regions including the Benin, Anambra and Chad basins and the Benue Trough. The remaining 13 blocks attracted no bids.\u003c/p\u003e\n\u003cp\u003eThe successful companies have not yet received final awards. They must pay the required signature bonuses and obtain approval from the minister of petroleum resources under the Petroleum Industry Act 2021, the regulator said. Commission chief executive Oritsemeyiwa Eyesan urged the companies to pay promptly and begin development, warning that they could lose the assets under a “drill or drop” provision.\u003c/p\u003e\n\u003cp\u003eThe 2026 round is expected to continue the competitive bidding approach by offering qualified investors additional exploration and development opportunities. The government says the exercise is intended to attract domestic and foreign capital, expand crude oil and natural gas production, and generate more public revenue. The supplied announcement did not specify the number of blocks, bidding timetable or qualification requirements.\u003c/p\u003e\n\u003cp\u003eThe investment drive comes as Nigeria’s petroleum finances face renewed scrutiny. Economist Dele Oye said an estimated 17.5 trillion naira liability owed by the federal government to the Nigerian National Petroleum Company Limited indicated that costs associated with the fuel subsidy announced as removed in 2023 may persist through energy-security expenses, under-recovery and other receivables.\u003c/p\u003e\n\u003cp\u003eOye argued that the arrangement reduced financial transparency and placed pressure on public finances. He also called for greater emphasis on domestic refining, reliable crude supplies for local refineries and a transparent fuel-pricing system. His comments represent an interpretation of the national oil company’s financial figures; the supplied material did not include a response from the government or NNPCL.\u003c/p\u003e\n\u003cp\u003eThe first test will be whether the 2025 winners promptly pay their bonuses and begin developing the awarded assets. Details of the 2026 block list, rules and timetable will then determine whether the government can convert investor interest into additional energy production and revenue.\u003c/p\u003e"},"C":{"headline":"Tinubu Approves Nigeria’s 2026 Oil and Gas Licensing Round","contentHtml":"\u003cp\u003ePresident Bola Tinubu has approved the start of Nigeria’s 2026 competitive oil and gas licensing round, extending the government’s effort to attract upstream investment after regulators selected provisional winners for 37 blocks in the previous exercise.\u003c/p\u003e\n\u003cp\u003eThe new round is intended to offer qualified investors opportunities to explore and develop petroleum assets under Nigeria’s existing regulatory framework. The government expects the process to support oil and gas production, draw domestic and foreign capital and strengthen long-term energy security.\u003c/p\u003e\n\u003cp\u003eDetails on the number and location of blocks to be offered, the bidding timetable and qualification requirements were not included in the announcement.\u003c/p\u003e\n\u003cp\u003eThe approval came as the Nigerian Upstream Petroleum Regulatory Commission concluded the bidding stage of its 2025 licensing round in Abuja on July 21. The regulator said 31 companies emerged as winners of 37 oil and gas blocks after 143 companies submitted 200 bids.\u003c/p\u003e\n\u003cp\u003eThirty-seven of the 50 blocks offered received bids, while 13 attracted none. The available assets covered onshore, shallow-water and deep-offshore areas, as well as frontier basins including the Benue Trough, Chad, Anambra and Benin basins.\u003c/p\u003e\n\u003ch2\u003eFinal awards depend on payments and ministerial approval\u003c/h2\u003e\n\u003cp\u003eThe successful bidders have not yet received final awards. The commission said companies must pay the required signature bonuses and obtain approval from the minister of petroleum resources in accordance with the Petroleum Industry Act of 2021.\u003c/p\u003e\n\u003cp\u003eNUPRC Chief Executive Oritsemeyiwa Eyesan urged the winners to make the payments promptly and begin developing the assets. She warned that companies could lose blocks if they fail to proceed under the commission’s “drill or drop” rule, which is intended to prevent license holders from leaving petroleum assets undeveloped.\u003c/p\u003e\n\u003cp\u003eThe regulator said the level of bidding interest in frontier basins was unprecedented for Nigeria. However, the 13 blocks that drew no offers also showed that investor demand was uneven across the assets presented.\u003c/p\u003e\n\u003cp\u003eThe 2026 round will test whether the government can sustain interest while converting competitive bids into exploration, production and public revenue. Its immediate milestones will be the publication of bidding terms and the completion of the outstanding payment and approval requirements for the 2025 winners.\u003c/p\u003e"}}},{"id":"03","imageDataUrl":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQABLAEsAAD/4QCARXhpZgAATU0AKgAAAAgABAEaAAUAAAABAAAAPgEbAAUAAAABAAAARgEoAAMAAAABAAIAAIdpAAQAAAABAAAATgAAAAAAldwpAACAAACV3CkAAIAAAAOgAQADAAAAAQABAACgAgAEAAAAAQAAAeCgAwAEAAAAAQAAAQ4AAAAA/+0AOFBob3Rvc2hvcCAzLjAAOEJJTQQEAAAAAAAAOEJJTQQlAAAAAAAQ1B2M2Y8AsgTpgAmY7PhCfv/AABEIAQ4B4AMBIgACEQEDEQH/xAAfAAABBQEBAQEBAQAAAAAAAAAAAQIDBAUGBwgJCgv/xAC1EAACAQMDAgQDBQUEBAAAAX0BAgMABBEFEiExQQYTUWEHInEUMoGRoQgjQrHBFVLR8CQzYnKCCQoWFxgZGiUmJygpKjQ1Njc4OTpDREVGR0hJSlNUVVZXWFlaY2RlZmdoaWpzdHV2d3h5eoOEhYaHiImKkpOUlZaXmJmaoqOkpaanqKmqsrO0tba3uLm6wsPExcbHyMnK0tPU1dbX2Nna4eLj5OXm5+jp6vHy8/T19vf4+fr/xAAfAQADAQEBAQEBAQEBAAAAAAAAAQIDBAUGBwgJCgv/xAC1EQACAQIEBAMEBwUEBAABAncAAQIDEQQFITEGEkFRB2FxEyIygQgUQpGhscEJIzNS8BVictEKFiQ04SXxFxgZGiYnKCkqNTY3ODk6Q0RFRkdISUpTVFVWV1hZWmNkZWZnaGlqc3R1dnd4eXqCg4SFhoeIiYqSk5SVlpeYmZqio6Slpqeoqaqys7S1tre4ubrCw8TFxsfIycrS09TV1tfY2dri4+Tl5ufo6ery8/T19vf4+fr/2wBDAAYGBgYGBgsGBgsPCwsLDxQPDw8PFBoUFBQUFBofGhoaGhoaHx8fHx8fHx8lJSUlJSUrKysrKzAwMDAwMDAwMDD/2wBDAQcICAwLDBULCxUzIhwiMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzP/3QAEAB7/2gAMAwEAAhEDEQA/AOBoIpe1Brx0fu8iM0zFSGo6TEh4qZagXrU6mkakgp1NFOFUSgIqNhUtRtQX0IHqnJ7Vcaqb0znqlKWq5qxJVc+tWjx6m41ulV2qw1QNTOeZEaVcUGhOtWjiluWY60Yqzo60Is1EkdtBmpEauryKoRVfXpUnowYjdMVUerrVX8qSQ4jUsfYZ/lQaOSS1ZTIBNPArdtfDHiC9P+j2UzA9ypA/XFdHbfDbxXPy8CRD/bcD+WapQk9kcFTHYeHx1EvmefEVCRXsUHwl1Nubq7ij9lDMf6Cty3+EmlqP9KvJZP8AdAX/ABrRUJvoedVzzBx+3f5M8CQc1ZQYr6Ot/hh4UhwWSWQj+8/+GK1V8A+E+MWS8f7Tf41f1aRwPiTDLZM+Z15pzCvqaPwd4ZQYFhD+K5/nVpvDWh/ZZLSO0iRZFKkqoB596Pqz7l srisNK46jGO9V3jcTpJwQAw/PFWYbxblMMvUUAYDf7PX3q0+bYNjEu7Oea6SWM4yNp9qvTPs2wj8asuNoyO44rGRy0mWOTU7Db0OC8RWoju5JF6E5/Ouo8Lan9rshDIfnh4P07VU1yFZGOe65rlNBunsdZWNeRIdprD4Zj3ietyrkEdjXKMDb3bR9m5H1rqs7lx6Vz+rJ5eJR1U1vLuZRNGNxLHsbuKdDp1sG3ugduxIzS6dYSXUO9JNme+MkfSo7nwtdvmS31GdW7Z6fpRe2oct3a5deztpFxLEjD0Kiucv8AwlYXAL2hMD+nVaxH17WNIuGtrh1uAhwc/wCNdbpOsR6tB56IUI6g80JwnpYvlnT1TPKNU02+0yTy7pMA9HHQ1jEktn1r3+4ggvIGiuEDq3BB6V5B4m0RdHlBgfMcnKg9RXLWo8mqO2hW59HuczIpz1rI1GAyRCRPvp8w+orUY5X5ucVRnYqgHrXOjqMbxHjUNIguwMvGwH58f4V9KeAtCTw/4VtoWTZcSxiSbPXc3OPw9K8x+Fmk2+pzS3N4okS0fKIwyN56H8K96uHKwMRXdTXuHn1neZL/AAhqcJG6dqit23IM0rrtPFanM0JIBIu0jIPBryjWI5/DF40sAP2a4ORj+FvSvWCQBWZq+mwatYPaTjgjg+h7GkwTPDdSuDq7B5OidK56ZxbzbR6V0AhNvvhY5KsRn6Vy+oEmc1YnqWhdGRGjPcGuCvEBc49a34JWFyq+9ZF0v7w/WsKu5vR2sXIfEFzHob6BNEskbfdYk7lGc4rLjtLB0jVINrjJd9xO4/ToAKjIAOKs2zdq5m7bHUknuaUMMcYyigGrwGBiqkLErn3q0Ccgmsm77m6SWxPHGJfk7GoptLU9qntmIcEVuFgRyK6qGqOSvJxasf/Z","versions":{"A":{"headline":"Atiku’s U.S. Lobbyists Send Tinubu Forfeiture Records to Trump Officials and Congress","contentHtml":"\u003cp\u003eA Washington lobbying firm hired by Atiku Abubakar says it has begun distributing more than 60 pages of U.S. Department of Justice records concerning President Bola Tinubu’s 1993 civil forfeiture case to Trump administration officials, lawmakers and senior congressional staff. The firm says it wants U.S. policymakers to review the historical record. The case ended in a civil settlement involving the forfeiture of some funds, while a Nigerian court later found no evidence that Tinubu had been criminally convicted in the United States.\u003c/p\u003e\n\u003cp\u003eVon Batten-Montague-York, L.C. disclosed the effort in a post on X. Atiku, a former Nigerian vice president and the African Democratic Congress presidential candidate, retained the firm in March under a 12-month contract reportedly worth $1.2 million. Its work includes advocacy, diplomatic engagement and presenting Atiku’s positions on Nigeria-U.S. relations.\u003c/p\u003e\n\u003ch2\u003eThe Lobbying Effort Revives Attention on the Old Case\u003c/h2\u003e\n\u003cp\u003eThe firm said it began sending DOJ court filings, supporting affidavits, related federal court decisions and a case chronology after discussions with members of the Trump administration, Congress and senior congressional staff. It said some U.S. officials had previously been unaware of the historical case and that it wanted the records available for policymakers to review.\u003c/p\u003e\n\u003cp\u003eThe chronology revisits a DOJ investigation into an alleged heroin-trafficking network operating between Nigeria and the United States. According to the records, the U.S. government alleged that bank accounts in the United States associated with Tinubu held proceeds from narcotics trafficking or funds connected to money laundering, and it filed a civil forfeiture action in the U.S. District Court for the Northern District of Illinois.\u003c/p\u003e\n\u003cp\u003eThe government allegations also named Adegboyega Mueez Akande and Abiodun Agbele. The case was not resolved through a criminal trial. Instead, a civil settlement was reached in 1993 under which part of the disputed funds was forfeited to the U.S. government.\u003c/p\u003e\n\u003ch2\u003eCivil Forfeiture Did Not Establish a Criminal Conviction\u003c/h2\u003e\n\u003cp\u003eThat distinction became central to litigation over Nigeria’s 2023 presidential election. Atiku and Labour Party presidential candidate Peter Obi argued that the forfeiture proceedings affected Tinubu’s qualification to contest the election.\u003c/p\u003e\n\u003cp\u003eNigeria’s Presidential Election Petition Court rejected the argument. It ruled that the U.S. forfeiture proceedings were civil and that the petitioners had not established that Tinubu was convicted of a criminal offence in the United States or made false declarations to Nigeria’s Independent National Electoral Commission. The records now being circulated therefore concern a historical investigation and civil settlement, not a criminal conviction of Tinubu.\u003c/p\u003e\n\u003cp\u003eThe materials also address an ongoing Freedom of Information Act lawsuit filed in 2023 by journalist Aaron Greenspan, who sought additional records from several U.S. federal agencies concerning the historical investigation. The chronology says a U.S. court ruled in 2025 that some agencies could not use blanket refusals to confirm or deny whether records existed and ordered them to process portions of the request.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm said the documents are being provided to congressional committees for informational and oversight purposes. The effort has returned the old case to political discussion in Washington, but it does not change the established legal position: the 1993 proceeding ended in a civil settlement, and Nigeria’s election court found no resulting criminal conviction.\u003c/p\u003e"},"B":{"headline":"Atiku’s Lobbyist Sends Tinubu Forfeiture Records to US Officials","contentHtml":"\u003cp\u003eA Washington lobbying firm retained by former Nigerian Vice President Atiku Abubakar says it has begun providing more than 60 pages of U.S. Justice Department documents and court materials to Trump administration officials, members of Congress and senior congressional staff. The records concern historical allegations connected to a 1993 civil forfeiture case involving Nigerian President Bola Tinubu.\u003c/p\u003e\n\u003cp\u003eVon Batten-Montague-York was hired by Atiku, the African Democratic Congress presidential candidate, under a reported 12-month, $1.2 million contract signed in March. Its work includes diplomatic outreach, advocacy and presenting Atiku’s positions on Nigeria-U.S. relations.\u003c/p\u003e\n\u003cp\u003eIn a post on X, the firm said it began distributing Justice Department court filings, supporting affidavits and related federal court decisions after discussions with administration officials and congressional offices. It said some U.S. officials had not previously been aware of the case and that it wanted to ensure the records were available for review.\u003c/p\u003e\n\u003cp\u003eThe materials include a background chronology stating that the Justice Department investigated an alleged heroin-trafficking organization operating between Nigeria and the United States. The document says authorities alleged that proceeds generated between 1988 and 1991 were deposited into U.S. bank accounts associated with Tinubu. The allegations also named Adegboyega Mueez Akande and Abiodun Agbele.\u003c/p\u003e\n\u003cp\u003eThe U.S. government filed a civil forfeiture action in 1993 in the U.S. District Court for the Northern District of Illinois, alleging that the funds were narcotics proceeds or connected to money laundering. The matter ended in a settlement under which part of the money was forfeited to the U.S. government. The available materials do not show that Tinubu was criminally convicted in the United States over the case.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm is also highlighting a Freedom of Information Act lawsuit filed in 2023 by journalist Aaron Greenspan seeking investigative records from several federal agencies. According to the circulated chronology, a U.S. court ruled in 2025 that some agencies had to process portions of the request rather than issue blanket refusals to confirm or deny whether records existed. The firm said the materials were being supplied to congressional committees for informational and oversight purposes.\u003c/p\u003e\n\u003cp\u003eThe forfeiture case was previously raised in litigation challenging Nigeria’s 2023 presidential election result. Atiku and former Labour Party presidential candidate Peter Obi argued that the proceedings affected Tinubu’s eligibility to contest the election. Nigeria’s Presidential Election Petition Court rejected the argument, ruling that the U.S. proceedings were civil rather than criminal and that the petitioners had not proved Tinubu was convicted of a criminal offense or made false declarations to the Independent National Electoral Commission.\u003c/p\u003e\n\u003cp\u003eThe lobbying campaign returns the decades-old case to Washington’s policy discussion, but the documents being circulated concern historical allegations and civil proceedings, not a new criminal charge or conviction.\u003c/p\u003e"},"C":{"headline":"Atiku Lobbyist Sends Tinubu Forfeiture Records to US Officials","contentHtml":"\u003cp\u003eA Washington lobbying firm retained by Nigerian opposition leader Atiku Abubakar says it has begun distributing more than 60 pages of U.S. Justice Department records concerning President Bola Tinubu’s 1993 civil forfeiture case to Trump administration officials and members of Congress.\u003c/p\u003e\n\u003cp\u003eVon Batten-Montague-York, L.C. said it provided court filings, affidavits and related federal court decisions after discussions with administration officials, lawmakers and senior congressional staff. The firm said the materials were intended to make U.S. policymakers aware of the historical case and support congressional information and oversight efforts.\u003c/p\u003e\n\u003cp\u003eAbubakar, a former Nigerian vice president and presidential candidate of the African Democratic Congress, hired the firm in March under a 12-month contract reportedly valued at $1.2 million. Its work includes advocacy, diplomatic outreach and presenting his views on Nigeria-U.S. relations.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm said the documents concern Justice Department allegations connected to a heroin-trafficking investigation spanning the late 1980s and early 1990s. The records include a chronology of the forfeiture proceedings and later litigation seeking the release of federal records.\u003c/p\u003e\n\u003ch2\u003eThe records revive a contested political issue\u003c/h2\u003e\n\u003cp\u003eThe chronology says U.S. authorities investigated a suspected drug-trafficking organization operating between Nigeria and the United States and alleged that proceeds were deposited in American bank accounts associated with Tinubu. It identifies Tinubu, Adegboyega Mueez Akande and Abiodun Agbele among those named in the government’s allegations.\u003c/p\u003e\n\u003cp\u003eThe Justice Department filed a civil forfeiture action in 1993 in the U.S. District Court for the Northern District of Illinois. The matter ended in a negotiated settlement under which a portion of the funds was forfeited to the U.S. government. The supplied material contains no indication that Tinubu was criminally convicted in connection with the case.\u003c/p\u003e\n\u003cp\u003eThe lobbying firm is also circulating information about a Freedom of Information Act lawsuit filed in 2023 by journalist Aaron Greenspan seeking additional federal records related to the investigation. According to the chronology, a federal court in Washington ruled in 2025 that some agencies could not issue blanket refusals to confirm or deny the existence of records and ordered them to process parts of the request. The litigation remains ongoing, the firm said.\u003c/p\u003e\n\u003cp\u003eThe forfeiture proceedings were previously raised by Abubakar and former Labour Party presidential candidate Peter Obi in challenges to Nigeria’s 2023 presidential election. Nigeria’s Presidential Election Petition Court rejected their argument, ruling that the U.S. proceedings were civil rather than criminal and that the petitioners had not established that Tinubu was convicted of a criminal offence or made false declarations to Nigeria’s electoral commission.\u003c/p\u003e\n\u003cp\u003eThe lobbying campaign places the decades-old case before U.S. officials as Abubakar expands his diplomatic advocacy in Washington. The materials did not include a response from Tinubu or his administration to the firm’s latest action.\u003c/p\u003e"}}}]</script>
  <script>
    (() => {
      "use strict";

      const articles = JSON.parse(document.getElementById("articleData").textContent);
      const versions = ["A", "B", "C"];
      const storageKey = "english-abc-mobile-reader-three-stories-v1";
      const elements = {
        progressText: document.getElementById("progressText"),
        articleTabs: [...document.querySelectorAll(".article-tab")],
        versionTabs: [...document.querySelectorAll(".version-tab")],
        headline: document.getElementById("headline"),
        articleImage: document.getElementById("articleImage"),
        articleContent: document.getElementById("articleContent"),
        previousButton: document.getElementById("previousButton"),
        nextButton: document.getElementById("nextButton"),
      };

      const emptyState = () => ({
        articleIndex: 0,
        activeVersions: {},
        scrollPositions: {},
      });

      function loadState() {
        try {
          const saved = localStorage.getItem(storageKey);
          return saved ? { ...emptyState(), ...JSON.parse(saved) } : emptyState();
        } catch {
          return emptyState();
        }
      }

      let state = loadState();
      state.articleIndex = Math.min(
        Math.max(Number(state.articleIndex) || 0, 0),
        articles.length - 1,
      );
      let scrollTimer;

      function currentArticle() {
        return articles[state.articleIndex];
      }

      function ensureArticleState(id) {
        state.activeVersions[id] ||= "A";
        state.scrollPositions[id] ||= { A: 0, B: 0, C: 0 };
      }

      function saveState() {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state));
        } catch {
          // Keep the current session usable when storage is unavailable.
        }
      }

      function saveCurrentScroll() {
        const article = currentArticle();
        ensureArticleState(article.id);
        const version = state.activeVersions[article.id];
        state.scrollPositions[article.id][version] = Math.max(0, window.scrollY);
      }

      function renderArticleTabs() {
        const selectedId = currentArticle().id;
        elements.articleTabs.forEach((button) => {
          const selected = button.dataset.articleId === selectedId;
          button.setAttribute("aria-selected", String(selected));
          button.tabIndex = selected ? 0 : -1;
          button.setAttribute("aria-label", "Article " + button.dataset.articleId);
          if (selected) {
            requestAnimationFrame(() =>
              button.scrollIntoView({ block: "nearest", inline: "center", behavior: "auto" }),
            );
          }
        });
      }

      function renderVersionTabs() {
        const article = currentArticle();
        const selectedVersion = state.activeVersions[article.id];
        elements.versionTabs.forEach((button) => {
          const selected = button.dataset.version === selectedVersion;
          button.setAttribute("aria-selected", String(selected));
          button.tabIndex = selected ? 0 : -1;
          button.setAttribute("aria-label", "Version " + button.dataset.version);
        });
      }

      function renderVersion(restoreScroll = true) {
        const article = currentArticle();
        ensureArticleState(article.id);
        const version = state.activeVersions[article.id];
        const content = article.versions[version];
        elements.headline.textContent = content.headline;
        elements.articleImage.src = article.imageDataUrl;
        elements.articleImage.alt = "News image for: " + content.headline;
        elements.articleContent.innerHTML = content.contentHtml;
        renderVersionTabs();

        if (restoreScroll) {
          const target = state.scrollPositions[article.id][version] || 0;
          requestAnimationFrame(() => window.scrollTo({ top: target, behavior: "auto" }));
        }
      }

      function renderArticle(restoreScroll = true) {
        const article = currentArticle();
        ensureArticleState(article.id);
        elements.progressText.textContent =
          "Article " + article.id + " of " + articles.length;
        elements.previousButton.disabled = state.articleIndex === 0;
        elements.nextButton.disabled = state.articleIndex === articles.length - 1;
        renderArticleTabs();
        renderVersion(restoreScroll);
        saveState();
      }

      function switchArticle(id) {
        const nextIndex = articles.findIndex((article) => article.id === id);
        if (nextIndex < 0 || nextIndex === state.articleIndex) return;
        saveCurrentScroll();
        state.articleIndex = nextIndex;
        ensureArticleState(currentArticle().id);
        saveState();
        renderArticle(true);
      }

      function switchVersion(version) {
        const article = currentArticle();
        if (state.activeVersions[article.id] === version) return;
        saveCurrentScroll();
        state.activeVersions[article.id] = version;
        saveState();
        renderVersion(true);
      }

      function navigate(delta) {
        const nextIndex = state.articleIndex + delta;
        if (nextIndex < 0 || nextIndex >= articles.length) return;
        switchArticle(articles[nextIndex].id);
      }

      elements.articleTabs.forEach((button) => {
        button.addEventListener("click", () => switchArticle(button.dataset.articleId));
        button.addEventListener("keydown", (event) => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const direction = event.key === "ArrowRight" ? 1 : -1;
          const nextIndex =
            (state.articleIndex + direction + articles.length) % articles.length;
          switchArticle(articles[nextIndex].id);
          document.querySelector('[data-article-id="' + articles[nextIndex].id + '"]').focus();
        });
      });

      elements.versionTabs.forEach((button) => {
        button.addEventListener("click", () => switchVersion(button.dataset.version));
        button.addEventListener("keydown", (event) => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const currentVersion = state.activeVersions[currentArticle().id];
          const currentIndex = versions.indexOf(currentVersion);
          const direction = event.key === "ArrowRight" ? 1 : -1;
          const nextVersion =
            versions[(currentIndex + direction + versions.length) % versions.length];
          switchVersion(nextVersion);
          document.querySelector('[data-version="' + nextVersion + '"]').focus();
        });
      });

      elements.previousButton.addEventListener("click", () => navigate(-1));
      elements.nextButton.addEventListener("click", () => navigate(1));

      window.addEventListener("scroll", () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          saveCurrentScroll();
          saveState();
        }, 80);
      }, { passive: true });

      window.addEventListener("pagehide", () => {
        saveCurrentScroll();
        saveState();
      });

      ensureArticleState(currentArticle().id);
      renderArticle(true);
    })();
  </script>
</body>
</html>
